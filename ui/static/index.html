const STEP_LABELS = ['Preflight','Network','Method','Configure','Review'];

function renderSetup(){
  const c = $('#view-setup');
  // Already installed -> the wizard would try to re-install; show a guard instead.
  if(state.nodes[state.node]?.installed){
    c.innerHTML = `<div class="card"><h3>${esc(cap(state.node))} is already installed</h3>
      <p style="color:var(--text2);font-size:13px">This node is set up and managed by Telcoin Node Scripts. The Setup wizard only installs a node that isn't present yet — manage this one from the <strong>Dashboard</strong>, <strong>Config</strong>, or <strong>Update</strong> tabs.</p>
      <button class="btn btn-out" onclick="switchView('dashboard')">Go to Dashboard →</button></div>`;
    return;
  }
  const steps = STEP_LABELS.map((l,i)=>{
    const n=i+1; const cls = n<state.setupStep?'done':(n===state.setupStep?'active':'');
    return `<div class="step ${cls}"><div class="num">${n<state.setupStep?'✓':n}</div><div class="slbl">${l}</div></div>`;
  }).join('');
  c.innerHTML = `<div class="note">This wizard installs a <strong>${esc(cap(state.node))}</strong> node directly via <span class="mono">setup-${esc(state.node)}.sh --json</span>: generate keys, then (after you confirm a backup) finalize and start. Source builds take 20–40 minutes.</div>
    <div class="steps">${steps}</div><div class="card" id="stepBody"></div>`;
  const body = $('#stepBody');
  ({1:stepPreflight,2:stepNetwork,3:stepMethod,4:stepConfigure,5:stepReview}[state.setupStep])(body);
  loadSetupDefaults();
}

// Prefill auto-detected fields (public/internal IP, latest docker image, service
// user/group) once, mirroring what the CLI scripts auto-detect. Only fills empty
// fields so it never clobbers operator edits.
async function loadSetupDefaults(){
  if(state.setup.defaultsLoaded) return;
  state.setup.defaultsLoaded = true;   // guard re-entry (renderSetup re-call below)
  const d = await api('/api/setup/defaults');
  if(!d || d.error) return;
  const s = state.setup;
  if(!s.publicIp)     s.publicIp     = d.public_ip || '';
  if(!s.internalIp)   s.internalIp   = d.internal_ip || '';
  if(!s.dockerImage)  s.dockerImage  = d.docker_image || '';
  if(!s.sourceRef)    s.sourceRef    = d.source_ref || '';
  // Network-aware default (mirrors the CLI): testnet should default to the latest
  // tagged release (main is bleeding-edge and not network-compatible). Only until
  // the operator changes it. devnet keeps main.
  if(!s.sourceModeTouched && s.sourceRef && isTestnetNetwork()) s.sourceMode='tag';
  if(!s.serviceUser)  s.serviceUser  = d.service_user || 'telcoin';
  if(!s.serviceGroup) s.serviceGroup = d.service_group || 'telcoin';
  if(state.view==='setup') renderSetup();   // refresh to show prefilled values
}

function goStep(n){ state.setupStep=n; renderSetup(); }

async function stepPreflight(body){
  body.innerHTML = `<h3>Step 1 · Preflight Checks</h3><div id="pfList"><div class="muted">Running checks…</div></div>
    <div class="wiz-nav"><button class="btn btn-out" id="pfRerun">↻ Re-run Checks</button><button class="btn btn-green" id="pfNext" disabled>Continue →</button></div>`;
  $('#pfRerun').addEventListener('click', ()=>stepPreflight(body));
  const d = await api('/api/setup/preflight');
  state.preflight = d;
  const hard = [
    ['systemd', d.systemd?.ok, `systemd ${d.systemd?.version??'?'} (need ≥ ${d.systemd?.required??247})`, true],
    ['internet', d.internet?.ok, 'Outbound internet connectivity', true],
    ['disk', d.disk?.ok, `Disk usage ${d.disk?.percent??'?'}% (need < 90%)`, true],
  ];
  const soft = [
    ['docker', d.docker?.ok, 'Docker engine available (optional)', false],
    ['rust', d.rust?.ok, 'Rust toolchain for source build (optional)', false],
    ['tpm', d.tpm?.ok, 'TPM device for sealed passphrase (optional)', false],
  ];
  const row = ([name,ok,desc,hardReq])=>{
    const icon = ok?'<span style="color:var(--green)">✓</span>':(hardReq?'<span style="color:var(--red)">✗</span>':'<span style="color:var(--yellow)">!</span>');
    return `<div class="check"><div class="ci">${icon}</div><div class="cl"><div class="ct">${esc(cap(name))}</div><div class="cd">${esc(desc)}</div></div></div>`;
  };
  $('#pfList').innerHTML = hard.map(row).join('') + soft.map(row).join('');
  const hardOk = hard.every(h=>h[1]);
  const next = $('#pfNext'); next.disabled = !hardOk;
  next.title = hardOk?'':'Hard requirements must pass';
  next.addEventListener('click', ()=>{ if(hardOk) goStep(2); });
  if(!hardOk) toast('Some hard requirements failed — resolve them before continuing','error');
}

function stepNetwork(body){
  body.innerHTML = `<h3>Step 2 · Network</h3>
    <div class="radio-cards">
      <div class="rcard ${state.setup.network==='adiri'?'sel':''}" data-net="adiri">
        <div class="rt">Adiri Testnet</div><div class="rd">Telcoin's public test network. Recommended for new nodes.</div></div>
      <div class="rcard disabled"><div class="rt">Mainnet <span class="tag">coming soon</span></div><div class="rd">Production network — not yet available.</div></div>
    </div>
    <div class="wiz-nav"><button class="btn btn-out" onclick="goStep(1)">← Back</button><button class="btn btn-green" onclick="goStep(3)">Continue →</button></div>`;
  body.querySelectorAll('[data-net]').forEach(r=>r.addEventListener('click',()=>{state.setup.network=r.dataset.net;renderSetup();}));
}

// Source-version picker -- mirrors the CLI menu (pick_source_version): main is
// the default, then the latest detected release tag, then custom. Sets
// state.setup.buildRef to the effective ref the backend checks out.
function stepSourceField(){
  const s = state.setup;
  const smode = s.sourceMode || 'main';
  const sref = s.sourceRef || '';
  const opts = `
    <option value="main" ${smode==='main'?'selected':''}>main — latest current version</option>
    ${sref?`<option value="tag" ${smode==='tag'?'selected':''}>${esc(sref)} — latest release</option>`:''}
    <option value="custom" ${smode==='custom'?'selected':''}>Custom branch / tag / commit…</option>`;
  return `<div class="field"><label>Source version to build</label>
      <select id="mSourceMode">${opts}</select>
      ${smode==='custom'
        ? `<input id="mBuildRef" style="margin-top:8px" placeholder="e.g. v0.9.2-adiri or main" value="${esc(s.customRef||'')}">`
        : ''}</div>`;
}

function isTestnetNetwork(){ return ['adiri','testnet'].includes(state.setup.network); }

// Snapshot the source picker into state and derive the effective build ref.
function captureSource(){
  const s = state.setup;
  const sel = $('#mSourceMode'); if(sel) s.sourceMode = sel.value;
  const inp = $('#mBuildRef');   if(inp) s.customRef = inp.value.trim();
  s.buildRef = s.sourceMode==='main' ? 'main'
             : s.sourceMode==='tag'  ? (s.sourceRef||'')
             : (s.customRef||'');
}

function stepMethod(body){
  const m = state.setup.method;
  const methodField = m==='source'
    ? stepSourceField()
    : `<div class="field"><label>Docker image (latest auto-filled — edit to pin a different tag)</label>
        <input id="mDockerImage" placeholder="us-docker.pkg.dev/telcoin-network/tn-public/adiri:v0.9.2-adiri" value="${esc(state.setup.dockerImage||'')}"></div>`;
  body.innerHTML = `<h3>Step 3 · Install Method</h3>
    <div class="radio-cards" style="grid-template-columns:1fr 1fr 1fr">
      <div class="rcard ${m==='source'?'sel':''}" data-m="source"><div class="rt">Build from Source</div><div class="rd">Compile the Rust binary on this host. Most flexible.</div></div>
      <div class="rcard ${m==='docker'?'sel':''}" data-m="docker"><div class="rt">Docker</div><div class="rd">Run the official container image.</div></div>
      <div class="rcard disabled"><div class="rt">Existing Binary <span class="tag">coming soon</span></div><div class="rd">Use a pre-built binary.</div></div>
    </div>
    ${methodField}
    <div class="wiz-nav"><button class="btn btn-out" onclick="goStep(2)">← Back</button><button class="btn btn-green" id="methodNext">Continue →</button></div>`;
  body.querySelectorAll('[data-m]').forEach(r=>r.addEventListener('click',()=>{
    // Persist whichever method field is currently shown before switching.
    if(state.setup.method==='source') captureSource();
    if($('#mDockerImage')) state.setup.dockerImage=$('#mDockerImage').value.trim();
    state.setup.method=r.dataset.m; renderSetup();
  }));
  // Re-render when the source-version mode changes (to show/hide the custom box).
  const sm=$('#mSourceMode'); if(sm) sm.addEventListener('change', ()=>{ state.setup.sourceModeTouched=true; captureSource(); renderSetup(); });
  $('#methodNext').addEventListener('click', ()=>{
    if(state.setup.method==='source') captureSource();
    if($('#mDockerImage')) state.setup.dockerImage=$('#mDockerImage').value.trim();
    if(state.setup.method==='source' && !state.setup.buildRef){ toast('Enter a source ref to build','error'); return; }
    goStep(4);
  });
}

function setupValidIp(v){ return /^([0-9]{1,3}\.){3}[0-9]{1,3}$/.test(v) || /^[0-9a-fA-F:]+$/.test(v); }

// Snapshot all Configure inputs into state before any re-render (radio clicks).

  if($('#cfgDataDir')) s.dataDir=$('#cfgDataDir').value.trim();

}

      </div>
    </div>
    <div class="note">External multiaddrs use your public IP; listener multiaddrs bind your internal IP — both on the standard P2P ports (49590/49594).</div>
    <div class="wiz-nav"><button class="btn btn-out" onclick="goStep(3)">← Back</button><button class="btn btn-green" id="cfgNext">Continue →</button></div>`;
  // Live hint: instance -> RPC port, plus the other (fixed) ports a node opens.
  const portHint = ()=>{
    const raw = ($('#cfgInstance')?.value||'').trim();
    const inst = /^[1-9]$/.test(raw) ? parseInt(raw,10) : parseInt(instDefault,10);
    const rpc = 8545 - (inst-1);
    const h = $('#cfgPortHint');
    if(h) h.innerHTML = `Instance ${inst} → RPC port <strong>${rpc}</strong>. This node also uses: P2P 49590 (primary) · 49594 (worker) · metrics 9000.`;
  };
  $('#cfgInstance')?.addEventListener('input', portHint); portHint();
  body.querySelectorAll('[data-rpc]').forEach(r=>r.addEventListener('click',()=>{ captureCfg(); state.setup.rpcPublic=(r.dataset.rpc==='public'); renderSetup(); }));
  body.querySelectorAll('[data-p]').forEach(r=>r.addEventListener('click',()=>{ captureCfg(); state.setup.passphrase=r.dataset.p; renderSetup(); }));
  $('#cfgNext').addEventListener('click', ()=>{
    captureCfg();
    const s=state.setup;
    if(!/^0x[0-9a-fA-F]{40}$/.test(s.eth)){ toast('Enter a valid 0x… address','error'); return; }
    if(!setupValidIp(s.publicIp)){ toast('Enter a valid public IP','error'); return; }
    if(!setupValidIp(s.internalIp)){ toast('Enter a valid internal IP (or 0.0.0.0)','error'); return; }
    if(s.instance && !/^[1-9]$/.test(s.instance)){ toast('Instance must be 1–9','error'); return; }
    if(s.serviceUser && !/^[a-zA-Z][a-zA-Z0-9_-]{0,31}$/.test(s.serviceUser)){ toast('Invalid service user name','error'); return; }
    if(s.serviceGroup && !/^[a-zA-Z][a-zA-Z0-9_-]{0,31}$/.test(s.serviceGroup)){ toast('Invalid service group name','error'); return; }
    if(!s.bls){ toast('Enter a BLS passphrase','error'); return; }
    if(s.bls!==s.blsConfirm){ toast('BLS passphrases do not match','error'); return; }
    goStep(5);
  });
}

// Step 5 is now a live installer: review -> Generate Keys (keygen phase) ->
// forced BACKED UP gate -> Finalize & Start (finalize phase).
function stepReview(body){
  const s = state.setup;
  const rows = [
    ['Node Type', cap(state.node)],
    ['Network', s.network==='adiri'?'Adiri Testnet':s.network],
    ['Install Method', s.method + (s.method==='source'?' ('+(s.buildRef||'?')+')':(s.dockerImage?' ('+s.dockerImage+')':''))],
    ['Address', s.eth||'(not set)'],
    ['Public IP', s.publicIp||'(not set)'],
    ['Internal IP (listener)', s.internalIp||'0.0.0.0'],
    ['Instance', s.instance || (state.node==='validator'?'1 (default)':'5 (default)')],
  ];
  if(state.node==='observer') rows.push(['RPC access', s.rpcPublic?'Public':'Private']);
  rows.push(
    ['Service user / group', (s.serviceUser||'telcoin')+' / '+(s.serviceGroup||'telcoin')],
    ['BLS Passphrase', s.bls?'•••••••• (set)':'(not set)'],
    ['Passphrase Protection', s.passphrase==='tpm'?'TPM / vTPM':'LoadCredential'],
  );
  body.innerHTML = `<h3>Step 5 · Install</h3>
    ${rows.map(([k,v])=>`<div class="kv"><span class="k">${esc(k)}</span><span class="v">${esc(v)}</span></div>`).join('')}
    <div class="note" style="margin-top:14px">Phase 1 generates the node keys (no service is created or started yet). After you confirm a backup, phase 2 finalizes and starts the node.${state.node==='validator'?' <strong>Validator on-chain registration is a separate CLI step the node will guide you through afterward.</strong>':''}</div>
    <div class="svc-row"><button class="btn btn-green" id="genKeysBtn">⚙ Generate Keys</button>
      <button class="btn btn-out" onclick="goStep(4)">← Back</button></div>
    <div class="card" id="setupProgressCard" style="display:none;margin-top:14px">
      <h3>Progress</h3><div class="log-body" id="setupLog" style="height:260px"></div>
    </div>
    <div id="backupGate"></div>`;
  $('#genKeysBtn').addEventListener('click', runKeygen);
}

function buildSetupPayload(includePassphrase){
  const s = state.setup;
  const p2p=49590, worker=49594;
  const ip = s.publicIp || '0.0.0.0';      // external advertised addr
  const lip = s.internalIp || '0.0.0.0';   // listener bind addr (internal NIC)
  const payload = {
    network: 'testnet',
    install_method: s.method,
    passphrase_method: s.passphrase,
    address: s.eth,
    build_ref: s.method==='source' ? s.buildRef : '',
    docker_image: s.method==='docker' ? s.dockerImage : '',
    instance: s.instance,
    external_primary: `/ip4/${ip}/udp/${p2p}/quic-v1`,
    external_worker:  `/ip4/${ip}/udp/${worker}/quic-v1`,
    listener_primary: `/ip4/${lip}/udp/${p2p}/quic-v1`,
    listener_worker:  `/ip4/${lip}/udp/${worker}/quic-v1`,
    public_ip: s.publicIp,
    rpc_public: (state.node==='observer') ? !!s.rpcPublic : false,
    advertised_name: s.advName || '',
    data_dir: s.dataDir || '',
    service_user: s.serviceUser,
    service_group: s.serviceGroup,
  };
  if(includePassphrase) payload.passphrase = s.bls;
  return payload;
}

// POST a setup phase and stream the response body (NOT EventSource -- so the
// passphrase never appears in a URL). Returns the terminal done event, or null.
async function streamSetup(phase, includePassphrase){
  let resp;
  try{
    resp = await fetch('/api/setup/'+state.node+'/'+phase, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(buildSetupPayload(includePassphrase)),
    });
  }catch(e){ toast('Setup request failed: '+e,'error'); return null; }
  if(!resp.ok){
    let msg=''; try{ msg=(await resp.json()).error; }catch(_){}
    toast('Setup rejected: '+(msg||resp.status),'error'); return null;
  }
  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let buf='', result=null;
  for(;;){
    const {value,done} = await reader.read();
    if(done) break;
    buf += dec.decode(value,{stream:true});
    let i;
    while((i=buf.indexOf('\n\n'))>=0){
      const frame=buf.slice(0,i); buf=buf.slice(i+2);
      const line=frame.split('\n').find(l=>l.startsWith('data: '));
      if(!line) continue;
      let d; try{ d=JSON.parse(line.slice(6)); }catch(_){ continue; }
      if(d.event==='closed') continue;
      appendStream('#setupLog', d);
      if(d.event==='done') result=d;
    }
  }
  return result;
}

async function runKeygen(){
  const b=$('#genKeysBtn'); if(b) b.disabled=true;
  const card=$('#setupProgressCard'); if(card) card.style.display='block';
  const buildNote = state.setup.method==='source'
    ? 'source builds take 20–40 min'
    : 'pulling the docker image';
  const log=$('#setupLog'); if(log) log.innerHTML='<div class="log-line info">» generating keys… ('+buildNote+' — keep this tab open)</div>';
  const d = await streamSetup('keygen', true);
  if(d && d.ok){ toast('Keys generated — back them up','success'); showBackupGate(d); }
  else { toast('Key generation failed'+(d&&d.msg?': '+d.msg:''),'error'); if(b) b.disabled=false; }
}

function showBackupGate(d){
  const info = d.node_info || '';
  const gate = $('#backupGate'); if(!gate) return;
  gate.innerHTML = `
    <div class="card" style="margin-top:14px;border-color:rgba(255,77,109,0.45)">
      <h3 style="color:var(--red)">⚠ Back up your keys now — they are UNRECOVERABLE if lost</h3>
      <div class="kv"><span class="k">Key files</span><span class="v">${esc(d.keys_dir||'—')}</span></div>
      <div class="kv"><span class="k">node-info.yaml</span><span class="v">${esc(d.node_info_path||'—')}</span></div>
      ${info?`<div class="log-body" style="height:220px;white-space:pre-wrap;margin-top:10px">${esc(info)}</div>`:'<p class="muted" style="font-size:13px;margin-top:10px">node-info.yaml not found on disk — copy the key files directly.</p>'}
      <div class="svc-row" style="margin-top:12px">
        ${info?'<button class="btn btn-out" id="dlNodeInfo">⤓ Download node-info.yaml</button>':''}
      </div>
      <div class="field"><label>Type <span class="mono">BACKED UP</span> to confirm you have saved these key files</label>
        <input id="backedUpInput" autocomplete="off" placeholder="BACKED UP"></div>
      <div class="svc-row"><button class="btn btn-green" id="finalizeBtn" disabled>Continue → Finalize &amp; Start Node</button></div>
    </div>`;
  const dl=$('#dlNodeInfo'); if(dl) dl.addEventListener('click', ()=>{
    const blob=new Blob([info],{type:'text/yaml'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='node-info.yaml'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(a.href);
  });
  const inp=$('#backedUpInput'), fb=$('#finalizeBtn');
  inp.addEventListener('input', ()=>{ fb.disabled = inp.value!=='BACKED UP'; });
  fb.addEventListener('click', runFinalize);
}

async function runFinalize(){
  const fb=$('#finalizeBtn'), inp=$('#backedUpInput');
  if(inp && inp.value!=='BACKED UP') return;
  if(fb) fb.disabled=true; if(inp) inp.disabled=true;
  const log=$('#setupLog'); if(log) log.insertAdjacentHTML('beforeend','<div class="log-line info">» finalizing and starting the node…</div>');
  const d = await streamSetup('finalize', false);
  if(d && d.ok){
    toast('Node finalized and started','success');
    await loadNodes(true);   // fresh detection so the dashboard won't say "not installed"
    if(state.node==='validator'){
      // Validators are not live until on-chain registration completes — show the
      // remaining steps instead of dropping straight to the dashboard.
      showValidatorNextSteps(state.setup.eth || (d && d.address) || '');
    } else {
      showSetupComplete();
    }
  } else {
    toast('Finalize failed'+(d&&d.msg?': '+d.msg:''),'error');
    if(fb) fb.disabled=false; if(inp) inp.disabled=false;
  }
}

// Observer finalize success: explicit completion card + button (no blind auto-
// redirect). The button force-refreshes node detection and rebuilds the
// dashboard so it never shows the stale "not installed" empty state.
function showSetupComplete(){
  const gate = $('#backupGate');
  const html = `
    <div class="card" style="margin-top:14px;border-color:rgba(0,232,122,0.35)">
      <h3 style="color:var(--green)">✅ ${esc(cap(state.node))} installed and started</h3>
      <p class="ns-instr" style="margin-top:-4px">Your node is running and beginning to sync. Open the dashboard to monitor it.</p>
      <div class="svc-row" style="margin-top:14px">
        <button class="btn btn-green" id="openDashBtn">Completed — Open Dashboard →</button>
      </div>
    </div>`;
  if(gate) gate.innerHTML = html;
  else { const log=$('#setupLog'); if(log) log.insertAdjacentHTML('beforeend', html); }
  const b=$('#openDashBtn'); if(b) b.addEventListener('click', openDashboardFresh);
}

// Re-detect nodes (fresh) and hard-rebuild the dashboard, then switch to it.
async function openDashboardFresh(){
  await loadNodes(true);
  const dash = $('#view-dashboard'); if(dash) delete dash.dataset.loaded;
  state.setupStep = 1;
  switchView('dashboard');
}

// Validator-only: on-chain registration steps that remain after the service is
// started. Steps 2–5 are pending (amber) until the operator completes them off
// the node (governance approval, NFT mint, staking). Observer setup never calls
// this and keeps the auto-redirect to the dashboard.

  const gate = $('#backupGate'); if(!gate) return;
  const a = addr || '';
  const checkCmd = `bash check-node.sh --address ${a||'<VALIDATOR_ADDRESS>'}`;
  gate.innerHTML = `
    <div class="card" style="margin-top:14px;border-color:rgba(0,232,122,0.35)">
      <h3 style="color:var(--green)">✅ Validator installed — Next Steps</h3>
      <p class="ns-instr" style="margin-top:-4px">Your validator service is running, but it is <strong>not live on the network</strong> until on-chain registration is complete. Work through the steps below.</p>

      <div class="ns-step done">
        <div class="ns-num">✓</div>
        <div class="ns-body">
          <div class="ns-title">Keys generated and backed up <span class="badge ok">Done</span></div>
          <div class="ns-instr">No action needed.</div>
        </div>
      </div>

      <div class="ns-step">
        <div class="ns-num">2</div>
        <div class="ns-body">
          <div class="ns-title">Submit your validator address to the Telcoin Association <span class="badge warn">Action required</span></div>
          <div class="field" style="margin-top:8px;margin-bottom:6px">
            <label>Your validator address</label>
            <div class="ns-codeblock">
              <code>${esc(a||'—')}</code>
              ${a?`<button class="copy-btn" title="Copy validator address" onclick="copyToClipboard('${esc(a)}','Validator address')">⧉ Copy</button>`:''}
            </div>
          </div>
          <div class="ns-instr">Submit this address to the Telcoin Association for governance approval. You will be notified once approved and the validator NFT has been minted to your address.</div>
        </div>
      </div>

      <div class="ns-step">
        <div class="ns-num">3</div>
        <div class="ns-body">
          <div class="ns-title">Stake TEL via the ConsensusRegistry contract <span class="badge warn">Pending NFT</span></div>
          <div class="ns-instr">Once your NFT has been minted, stake the required amount of TEL via the ConsensusRegistry contract. <a href="https://docs.telcoin.network/telcoin-network/staking/how-to-stake" target="_blank" rel="noopener">Staking guide</a></div>
        </div>
      </div>

      <div class="ns-step">
        <div class="ns-num">4</div>
        <div class="ns-body">
          <div class="ns-title">Run a health check <span class="badge warn">Pending</span></div>
          <div class="ns-instr">Once staking is complete, verify your validator is visible on the network.</div>
          <div class="ns-codeblock">
            <code>${esc(checkCmd)}</code>

          </div>
        </div>
      </div>

      <div class="ns-step">
        <div class="ns-num">5</div>
        <div class="ns-body">
          <div class="ns-title">Monitor your validator <span class="badge warn">Pending</span></div>
          <div class="ns-instr">Once live, your validator dashboard will show consensus participation, peer connectivity, and performance metrics.</div>
        </div>
      </div>

      <div class="svc-row" style="margin-top:16px">
        <button class="btn btn-green" id="nsGoDash">Go to Dashboard</button>
      </div>
    </div>`;
  const go=$('#nsGoDash'); if(go) go.addEventListener('click', openDashboardFresh);
}

// =============================================================================
// Auto-refresh + utils
// =============================================================================
function startAutoRefresh(){
  stopAutoRefresh();
  state.refreshTimer = setInterval(()=>{ loadNodes(); if(state.view==='dashboard') renderDashboard(); else if(state.view==='network') renderNetwork(); }, 15000);
}
function stopAutoRefresh(){ if(state.refreshTimer){ clearInterval(state.refreshTimer); state.refreshTimer=null; } }

function startTracesRefresh(){
  stopTracesRefresh();
  state.tracesTimer = setInterval(()=>{ if(state.view==='traces') refreshTracesData(); }, 30000);
}
function stopTracesRefresh(){ if(state.tracesTimer){ clearInterval(state.tracesTimer); state.tracesTimer=null; } }

// Version value with an optional second line for a non-default build branch.
// Only shows the branch when it's a real feature branch (not main/empty, and
// not 'detached' -- a detached HEAD is the normal tag-build case).
function versionHtml(ref){
  const base = esc(ref || '—');
  const br = state.buildInfo && state.buildInfo.exists ? (state.buildInfo.branch || '') : '';
  if(br && br!=='main' && br!=='detached'){
    return `${base}<br><span style="font-size:11px;color:var(--text3)">branch: ${esc(br)}</span>`;
  }
  return base;
}
function copyToClipboard(text, label){
  navigator.clipboard?.writeText(text).then(
    ()=>toast((label||'Value')+' copied','success'),
    ()=>toast('Copy failed','error'));
}
function cap(s){ return String(s).charAt(0).toUpperCase()+String(s).slice(1); }
function fmtNum(n){ return Number(n).toLocaleString('en-US'); }
// TEL amount -> "12,345.67 TEL". null/garbage -> null (callers show "—").
function fmtTel(x){
  if(x==null) return null;
  const n = Number(x);
  if(!isFinite(n)) return null;
  return n.toLocaleString('en-US', {maximumFractionDigits:4}) + ' TEL';
}
function netLabel(n){ return ({testnet:'Adiri Testnet', devnet:'Adiri Devnet', mainnet:'Mainnet'})[n] || (n?cap(n):'—'); }

// =============================================================================
// Nav-bar network status pill (Adiri Testnet, from /api/network/status)
// =============================================================================
function setNavNetPill(d){
  const el = $('#navNetPill'); if(!el) return;
  const overall = d && d.overall;
  // Name the network so the badge clearly reflects testnet vs devnet. Prefer the
  // slug of the data actually fetched; fall back to the detected node's network.
  const name = (d && d.slug && netLabel(d.slug)) || state.network.name || 'Network';
  if(!d || d.error || d.available===false || !overall || overall==='unknown'){
    el.className = 'net-pill'; el.textContent = '⚪ ' + name + ': —'; return;
  }
  const map = {
    up:       ['up',       '🟢 ' + name + ': Healthy'],
    degraded: ['degraded', '🟡 ' + name + ': Degraded'],
    down:     ['down',     '🔴 ' + name + ': Down'],
  };
  const [cls, txt] = map[overall] || ['', '⚪ ' + name + ': —'];
  el.className = 'net-pill ' + cls;
  el.textContent = txt;
}

async function pollNavNetPill(){
  const slug = state.network.slug || '';
  setNavNetPill(await api('/api/network/status' + (slug?('?slug='+encodeURIComponent(slug)):'')));
}

// =============================================================================
// Boot
// =============================================================================
// Close the Download dropdown on any outside click (queries #dlMenu live, so it
// works across log re-renders; attached once).
document.addEventListener('click', e=>{
  const m = $('#dlMenu');
  if(m && !e.target.closest('#dlDrop')) m.classList.remove('open');
});

(async function init(){
  await loadNodes();
  state.buildInfo = await api('/api/build-info');   // read once at page load
  // Pick the node to show on first load: default the view to whatever node is
  // actually installed on this server (observer OR validator -- a host runs one).
  // Covers external docker deployments too (they report installed). Falls back to
  // the 'observer' default on a fresh server with nothing installed.
  const firstInstalled = installedType();
  if(firstInstalled) state.node = firstInstalled;
  document.querySelectorAll('.node-btn').forEach(n=>n.classList.toggle('active', n.dataset.node===state.node));
  updateReadonlyBanner();
  syncReadonlyChrome();
  // Await so state.network (chain id -> slug/name) is set before the first nav
  // pill poll -- otherwise the pill would briefly show the testnet default on a
  // devnet node until the next 60s tick.
  await renderDashboard().catch(()=>{});
  startAutoRefresh();
  // Nav-bar network pill: refresh independently of the active view (60s; the
  // backend caches the external call anyway).
  pollNavNetPill();
  setInterval(pollNavNetPill, 60000);
})();
</script>
