<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telcoin Node Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080c14; --bg2:#0d1420; --bg3:#111b2e;
  --accent:#00b4ff; --accent2:#0066ff;
  --green:#00e87a; --yellow:#ffd93d; --red:#ff4d6d;
  --text:#e8f4ff; --text2:#7a9ab8; --text3:#3d5a73;
  --border:1px solid rgba(0,180,255,0.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Syne',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:14px;
  line-height:1.5;
  background-image:
    linear-gradient(rgba(0,180,255,0.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,180,255,0.035) 1px,transparent 1px);
  background-size:40px 40px;
  min-height:100vh;
}
.mono{font-family:'JetBrains Mono',monospace}
a{color:var(--accent);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
button:disabled{opacity:.5;cursor:not-allowed}

/* ---- Layout ---- */
/* Content area: centred, capped at 1600px, with consistent 32px side padding.
   Applies to the node selector row and every view (dashboard sections, control
   bar, Node Details, Quick Actions, etc.). */
.wrap{max-width:1600px;margin:0 auto;padding:0 32px}
/* The navbar stays full width (its own .wrap inside <header> keeps 28px gutters). */
header .wrap{max-width:none;padding:0 28px}

/* ---- Header ---- */
header{
  border-bottom:var(--border);
  background:rgba(8,12,20,0.85);
  backdrop-filter:blur(8px);
  position:sticky;top:0;z-index:50;
}
.hdr{display:flex;align-items:center;gap:24px;height:62px}
.brand{display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo{
  width:38px;height:38px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.logo img{width:100%;height:100%;object-fit:contain}
/* Fallback badge shown only if telcoin-logo.png is missing (img onerror). */
.logo.placeholder{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  font-weight:800;font-size:15px;color:#001;
  box-shadow:0 0 18px rgba(0,180,255,0.45);
}
.brand h1{font-size:16px;font-weight:700;letter-spacing:.3px}
.brand .sub{font-size:10px;color:var(--text2);letter-spacing:2px;text-transform:uppercase}
nav{display:flex;gap:4px;margin:0 auto}
.tab{
  padding:8px 15px;border-radius:8px;font-weight:600;font-size:13px;
  color:var(--text2);transition:.15s;
}
.tab:hover{color:var(--text);background:var(--bg2)}
.tab.active{color:var(--accent);background:rgba(0,180,255,0.1)}
.hdr-right{display:flex;align-items:center;gap:14px;flex-shrink:0}
.net-pill{
  font-size:11px;font-weight:600;padding:5px 11px;border-radius:14px;
  border:1px solid var(--text3);color:var(--text2);white-space:nowrap;
}
.net-pill.up{color:var(--green);border-color:rgba(0,232,122,0.4)}
.net-pill.degraded{color:var(--yellow);border-color:rgba(255,217,61,0.4)}
.net-pill.down{color:var(--red);border-color:rgba(255,77,109,0.4)}
.clock{font-size:12px;color:var(--text2);letter-spacing:.5px}
.btn-refresh{
  padding:7px 13px;border-radius:8px;border:var(--border);
  font-size:12px;font-weight:600;color:var(--text);transition:.15s;
}
.btn-refresh:hover{border-color:var(--accent);color:var(--accent)}

/* ---- Node selector ---- */
.selector{display:flex;gap:14px;padding:20px 0 12px}
.node-btn{
  flex:1;display:flex;align-items:center;gap:14px;
  padding:15px 18px;border-radius:12px;
  background:var(--bg2);border:1px solid rgba(0,180,255,0.12);
  transition:.18s;text-align:left;
}
.node-btn:hover{border-color:rgba(0,180,255,0.4)}
.node-btn.active{
  border-color:var(--accent);
  box-shadow:0 0 0 1px var(--accent),0 0 24px rgba(0,180,255,0.25);
  background:var(--bg3);
}
.node-btn .nicon{font-size:24px;line-height:1}
.node-btn .nname{font-weight:700;font-size:15px;text-transform:capitalize}
.node-btn .nstat{font-size:12px;display:flex;align-items:center;gap:6px;color:var(--text2)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0}
.dot.green{background:var(--green);box-shadow:0 0 8px var(--green)}
.dot.red{background:var(--red)}
.dot.gray{background:var(--text3)}

/* ---- Views / cards ---- */
.view{padding:18px 0 60px;display:none}
.view.active{display:block}
.card{
  background:var(--bg2);border:var(--border);border-radius:12px;padding:18px;
}
.card h3{font-size:12px;text-transform:uppercase;letter-spacing:1.4px;color:var(--text2);margin-bottom:14px;font-weight:600}
.grid{display:grid;gap:14px}
.stats{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));margin-top:16px}
.two-col{grid-template-columns:1fr 1fr;margin-top:14px}
@media(max-width:720px){.two-col{grid-template-columns:1fr}}

.group-label{font-size:10px;text-transform:uppercase;letter-spacing:1.8px;color:var(--text3);font-weight:600;margin:22px 0 0}
.group-label:first-of-type{margin-top:8px}
/* Full-width single-column dashboard (.wrap supplies consistent side padding) */
.dash{max-width:none;margin:0}
/* Per-section card grids: explicit column counts so each row fills edge-to-edge
   with no empty trailing space. min-width:0 on items lets long content (e.g. the
   version string) wrap instead of blowing the grid track out. */
.dgrid{display:grid;gap:14px;margin-top:8px}
.dgrid>*{min-width:0}
/* Centre dashboard metric cards (label / value / subtitle). The text-heavy
   Last Error + Last Restart cards opt out via .tleft. */
.dgrid .stat{text-align:center}
.dgrid .stat.tleft{text-align:left}
.dgrid-4{grid-template-columns:repeat(4,1fr)}
.dgrid-5{grid-template-columns:repeat(5,1fr)}
.dgrid-6{grid-template-columns:repeat(6,1fr)}
.dgrid-3{grid-template-columns:repeat(3,1fr)}
.dgrid-auto{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
@media(max-width:820px){
  .dgrid-3,.dgrid-4,.dgrid-5,.dgrid-6{grid-template-columns:repeat(2,1fr)}
}
.stat .label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text2)}
.stat .val{font-size:26px;font-weight:700;margin-top:6px;font-family:'JetBrains Mono',monospace}
.stat .meta{font-size:12px;color:var(--text2);margin-top:4px}
.val.green{color:var(--green)} .val.red{color:var(--red)} .val.yellow{color:var(--yellow)} .val.accent{color:var(--accent)}

/* progress bar */
.bar{height:7px;border-radius:5px;background:var(--bg);overflow:hidden;margin-top:12px}
.bar > span{display:block;height:100%;border-radius:5px;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:width .8s ease}
.bar > span.warn{background:linear-gradient(90deg,var(--yellow),#ff9d3d)}
.bar > span.crit{background:linear-gradient(90deg,var(--red),#ff7d8d)}

/* ---- Service control row ---- */
.svc-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.pill{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 16px;border-radius:20px;font-weight:700;font-size:13px;
  background:var(--bg);border:1px solid var(--text3);
}
.pill.green{color:var(--green);border-color:rgba(0,232,122,0.4)}
.pill.red{color:var(--red);border-color:rgba(255,77,109,0.4)}
.pill.busy{color:var(--yellow);border-color:rgba(255,217,61,0.4)}
.btn{
  padding:9px 18px;border-radius:9px;font-weight:700;font-size:13px;transition:.15s;
  display:inline-flex;align-items:center;gap:8px;
}
.btn-green{background:var(--green);color:#002;}
.btn-green:hover:not(:disabled){box-shadow:0 0 18px rgba(0,232,122,0.5)}
.btn-red{border:1px solid var(--red);color:var(--red)}
.btn-red:hover:not(:disabled){background:rgba(255,77,109,0.12)}
.btn-out{border:var(--border);color:var(--text)}
.btn-out:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.uptime{font-size:12px;color:var(--text2);margin-left:auto}
.spinner{
  width:13px;height:13px;border:2px solid rgba(255,255,255,0.3);
  border-top-color:currentColor;border-radius:50%;display:inline-block;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ---- key/value rows ---- */
.kv{display:flex;justify-content:space-between;gap:14px;padding:9px 0;border-bottom:1px solid rgba(0,180,255,0.06);font-size:13px}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--text2)}
.kv .v{font-family:'JetBrains Mono',monospace;text-align:right;word-break:break-all}
.kv input{
  background:var(--bg);border:var(--border);color:var(--text);border-radius:8px;
  padding:7px 10px;font-family:'JetBrains Mono',monospace;font-size:12px;min-width:220px;
}
.kv input:focus{outline:none;border-color:var(--accent)}
.copy-btn{padding:1px 6px;border-radius:6px;border:var(--border);color:var(--text2);font-size:12px;line-height:1.4}
.copy-btn:hover{color:var(--accent);border-color:var(--accent)}

/* quick actions */
.qa{display:flex;flex-direction:column;gap:10px}
.qa .btn{justify-content:center}

/* ---- Logs ---- */
.log-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.log-body{
  height:420px;overflow:auto;background:#020608;border-radius:9px;
  padding:12px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.65;
  border:1px solid rgba(0,180,255,0.08);
}
/* Logs tab: the log box fills the remaining viewport height (X accounts for the
   header navbar, node selector row, view/card padding, the card title and the
   toolbar row). The trimmed bottom padding keeps it flush with no empty area. */
#view-logs{padding-bottom:18px}
#logBody{height:calc(100vh - 320px);min-height:280px}
.log-line{white-space:pre-wrap;word-break:break-all;color:var(--text2)}
.log-line.err{color:var(--red)} .log-line.warn{color:var(--yellow)}
.log-line.ok{color:var(--green)} .log-line.info{color:var(--accent)}
.log-line.muted{color:var(--text3)}
.live-dot{width:9px;height:9px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,232,122,0.5)}50%{opacity:.5;box-shadow:0 0 0 6px rgba(0,232,122,0)}}
select{
  background:var(--bg);border:var(--border);color:var(--text);border-radius:8px;
  padding:7px 10px;font-family:inherit;font-size:12px;
}
.dropdown{position:relative;display:inline-block}
.dropdown-menu{
  position:absolute;right:0;top:calc(100% + 4px);min-width:190px;z-index:60;
  background:var(--bg2);border:var(--border);border-radius:9px;overflow:hidden;
  box-shadow:0 8px 30px rgba(0,0,0,0.5);display:none;
}
.dropdown-menu.open{display:block}
.dropdown-menu button{display:block;width:100%;text-align:left;padding:10px 13px;font-size:13px;color:var(--text)}
.dropdown-menu button:hover{background:var(--bg3);color:var(--accent)}
.log-controls input{
  background:var(--bg);border:var(--border);color:var(--text);border-radius:8px;
  padding:7px 10px;font-family:'JetBrains Mono',monospace;font-size:12px;min-width:160px;
}
.log-controls input:focus{outline:none;border-color:var(--accent)}

/* ---- Traces table ---- */
.tbl{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px}
.tbl th{
  text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1px;
  color:var(--text2);font-weight:600;padding:9px 10px;border-bottom:1px solid rgba(0,180,255,0.12);
}
.tbl td{padding:9px 10px;border-bottom:1px solid rgba(0,180,255,0.06);font-family:'JetBrains Mono',monospace}
.tbl tr:last-child td{border-bottom:none}
/* Recent Log Events: fixed layout so Message takes the remaining width and
   wraps fully (long unbreakable tokens included); rows grow to fit. */
.logtbl{table-layout:fixed}
.logtbl td{vertical-align:top}
.logtbl th:nth-child(1),.logtbl td:nth-child(1){width:84px}
.logtbl th:nth-child(2),.logtbl td:nth-child(2){width:74px}
.logtbl th:nth-child(3),.logtbl td:nth-child(3){width:160px}
.logtbl td:nth-child(3){white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logtbl td:nth-child(4){white-space:normal;overflow-wrap:anywhere;word-break:break-word}
.tbl tr.clickable{cursor:pointer;transition:.12s}
.tbl tr.clickable:hover td{background:rgba(0,180,255,0.06)}
.tbl .dur.green{color:var(--green)} .tbl .dur.yellow{color:var(--yellow)} .tbl .dur.red{color:var(--red)}
.badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:700}
.badge.ok{background:rgba(0,232,122,0.14);color:var(--green)}
.badge.err{background:rgba(255,77,109,0.14);color:var(--red)}
.badge.warn{background:rgba(255,217,61,0.16);color:var(--yellow)}
/* Validator dashboard §1 status hero */
.status-hero{margin-top:8px}
.status-hero .hero-main{font-size:26px;font-weight:800;line-height:1.2}
.status-hero .hero-sub{font-size:13px;color:var(--text2);margin-top:6px}
.status-hero .hero-main.green{color:var(--green)}
.status-hero .hero-main.amber{color:var(--yellow)}
.status-hero .hero-main.red{color:var(--red)}
.status-hero .hero-items{display:flex;flex-wrap:wrap;gap:28px;margin-top:16px}
.status-hero .hero-item{min-width:120px}
.status-hero .hero-item .hi-label{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text3)}
.status-hero .hero-item .hi-val{font-size:16px;font-weight:700;margin-top:3px}
.status-hero .hero-item .hi-val.green{color:var(--green)}
.status-hero .hero-item .hi-val.red{color:var(--red)}
/* Centred variant -- used only by the Validator Status card + its label. */
.group-label.center{text-align:center}
.status-hero.center{text-align:center}
.status-hero.center .hero-items{justify-content:center}
.status-hero.center .hero-item{text-align:center}
.ns-step{display:flex;gap:14px;padding:16px 0;border-top:1px solid rgba(0,180,255,0.10)}
.ns-step:first-child{border-top:0}
.ns-step.done{opacity:.85}
.ns-num{flex-shrink:0;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:rgba(255,217,61,0.16);color:var(--yellow)}
.ns-step.done .ns-num{background:rgba(0,232,122,0.16);color:var(--green)}
.ns-body{flex:1;min-width:0}
.ns-title{font-weight:600;color:var(--text);font-size:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ns-instr{color:var(--text2);font-size:13px;margin-top:6px;line-height:1.5}
.ns-codeblock{display:flex;align-items:center;gap:8px;margin-top:10px;background:var(--bg);border:var(--border);border-radius:8px;padding:8px 10px}
.ns-codeblock code{flex:1;min-width:0;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);white-space:nowrap;overflow-x:auto}
.toggle-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.jdot{width:9px;height:9px;border-radius:50%;background:var(--text3);display:inline-block;flex-shrink:0;vertical-align:middle;margin-right:6px}
.jdot.green{background:var(--green);box-shadow:0 0 8px var(--green)}
.jdot.gray{background:var(--text3)}

/* ---- Setup wizard ---- */
.steps{display:flex;gap:8px;margin-bottom:22px}
.step{flex:1;text-align:center}
.step .num{
  width:30px;height:30px;border-radius:50%;margin:0 auto 6px;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;
  background:var(--bg);border:1px solid var(--text3);color:var(--text2);
}
.step.active .num{border-color:var(--accent);color:var(--accent);box-shadow:0 0 14px rgba(0,180,255,0.4)}
.step.done .num{background:var(--green);border-color:var(--green);color:#002}
.step .slbl{font-size:11px;color:var(--text2)}
.step.active .slbl{color:var(--text)}
.check{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid rgba(0,180,255,0.06)}
.check .ci{width:22px;text-align:center;font-weight:700}
.check .cl{flex:1}
.check .cl .ct{font-weight:600}
.check .cl .cd{font-size:12px;color:var(--text2)}
.radio-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px}
.rcard{
  padding:15px;border-radius:11px;background:var(--bg);border:1px solid var(--text3);
  transition:.15s;cursor:pointer;
}
.rcard:hover:not(.disabled){border-color:rgba(0,180,255,0.5)}
.rcard.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.rcard.disabled{opacity:.45;cursor:not-allowed}
.rcard .rt{font-weight:700;display:flex;align-items:center;gap:8px}
.rcard .rd{font-size:12px;color:var(--text2);margin-top:5px}
.tag{font-size:9px;padding:2px 7px;border-radius:10px;background:var(--bg3);color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.field{margin-top:14px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px}
.field input{
  width:100%;background:var(--bg);border:var(--border);color:var(--text);
  border-radius:9px;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:13px;
}
.field input:focus{outline:none;border-color:var(--accent)}
.wiz-nav{display:flex;justify-content:space-between;margin-top:22px;gap:10px}
.note{
  background:rgba(0,180,255,0.07);border:1px solid rgba(0,180,255,0.2);
  border-radius:9px;padding:11px 13px;font-size:12px;color:var(--text2);margin-bottom:16px;
}
.cmd-box{
  background:#020608;border:1px solid rgba(0,180,255,0.15);border-radius:9px;
  padding:13px 15px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--green);
  margin-top:10px;word-break:break-all;
}

/* ---- empty state ---- */
.empty{text-align:center;padding:70px 20px}
.empty .ei{font-size:48px;margin-bottom:14px}
.empty h2{font-size:20px;margin-bottom:8px}
.empty p{color:var(--text2);margin-bottom:20px;max-width:380px;margin-left:auto;margin-right:auto}

/* ---- toasts ---- */
.toasts{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:10px;z-index:200}
.toast{
  min-width:240px;max-width:340px;padding:13px 16px;border-radius:10px;
  background:var(--bg3);border-left:3px solid var(--accent);
  box-shadow:0 8px 30px rgba(0,0,0,0.5);font-size:13px;font-weight:600;
  animation:slidein .3s ease;
}
.toast.success{border-left-color:var(--green)}
.toast.error{border-left-color:var(--red)}
.toast.info{border-left-color:var(--accent)}
.toast.out{animation:fadeout .3s ease forwards}
@keyframes slidein{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeout{to{transform:translateX(120%);opacity:0}}
.muted{color:var(--text3)}
</style>
</head>
<body>

<header>
  <div class="wrap hdr">
    <div class="brand">
      <div class="logo" id="brandLogo"><img src="/static/telcoin-logo.png" alt="Telcoin"
        onerror="this.parentElement.classList.add('placeholder');this.parentElement.textContent='TN'"></div>
      <div>
        <h1>Telcoin Node Manager</h1>
        <div class="sub">Network Operations</div>
      </div>
    </div>
    <nav id="nav">
      <button class="tab active" data-view="dashboard">Dashboard</button>
      <button class="tab" data-view="network">Network</button>
      <button class="tab" data-view="logs">Logs</button>
      <button class="tab" data-view="traces">Tracing</button>
      <button class="tab" data-view="config">Config</button>
      <button class="tab" data-view="update">Update</button>
      <button class="tab" data-view="system">System</button>
      <button class="tab" data-view="setup">Setup</button>
    </nav>
    <div class="hdr-right">
      <span class="net-pill" id="navNetPill" title="Network status">⚪ Network: …</span>
      <span class="clock mono" id="clock">--:--:-- UTC</span>
      <button class="btn-refresh" id="refreshBtn">↻ Refresh</button>
    </div>
  </div>
</header>

<div class="wrap">
  <!-- node selector -->
  <div class="selector" id="selector">
    <button class="node-btn active" data-node="observer">
      <span class="nicon">📡</span>
      <div>
        <div class="nname">Observer</div>
        <div class="nstat"><span class="dot gray" id="dot-observer"></span><span id="stat-observer">checking…</span></div>
      </div>
    </button>
    <button class="node-btn" data-node="validator">
      <span class="nicon">🛡️</span>
      <div>
        <div class="nname">Validator</div>
        <div class="nstat"><span class="dot gray" id="dot-validator"></span><span id="stat-validator">checking…</span></div>
      </div>
    </button>
  </div>

  <!-- read-only banner (public access or externally-deployed node) -->
  <div id="roBanner" style="display:none;margin:0 0 16px;padding:12px 16px;border-radius:10px;
    border:1px solid rgba(255,184,0,0.4);background:rgba(255,184,0,0.10);color:var(--text);font-size:13px">
    <span id="roBannerMsg"></span>
  </div>

  <!-- DASHBOARD -->
  <section class="view active" id="view-dashboard"></section>
  <!-- NETWORK -->
  <section class="view" id="view-network"></section>
  <!-- LOGS -->
  <section class="view" id="view-logs"></section>
  <!-- CONFIG -->
  <section class="view" id="view-config"></section>
  <!-- UPDATE -->
  <section class="view" id="view-update"></section>
  <!-- TRACES -->
  <section class="view" id="view-traces"></section>
  <!-- SETTINGS -->
  <!-- SETUP -->
  <section class="view" id="view-setup"></section>
  <!-- SYSTEM -->
  <section class="view" id="view-system"></section>
</div>

<div class="toasts" id="toasts"></div>

<script>
// =============================================================================
// State + helpers
// =============================================================================
const state = {
  node: 'observer',
  view: 'dashboard',
  nodes: { observer:{installed:false,status:'not installed'}, validator:{installed:false,status:'not installed'} },
  refreshTimer: null,
  tracesTimer: null,   // 30s traces auto-refresh
  es: null,        // log SSE
  updateES: null,  // update progress SSE
  configES: null,  // config-save progress SSE
  configEditing: false,
  live: false,
  logBuffer: [],                          // client-side line buffer (static + live)
  logFilter: { level:'all', search:'' },  // level (all/error/warn/info) + text search
  setupStep: 1,
  setup: { network:'adiri', method:'source', passphrase:'loadcredential',
           eth:'', bls:'', blsConfirm:'', buildRef:'main', dockerImage:'', publicIp:'', internalIp:'',
           sourceMode:'main', customRef:'', sourceRef:'', sourceModeTouched:false,   // source-version picker (mirrors CLI: main/latest tag/custom)
           instance:'', rpcPublic:false, advName:'', dataDir:'', serviceUser:'', serviceGroup:'', defaultsLoaded:false },
  preflight: null,
  buildInfo: null,   // /etc/telcoin/build-info (build_ref, branch, ...) read once at load
  network: { chainId:null, name:'', slug:'', configured:false },  // selected node's network
  publicReadonly: false,   // true when reached over the public Caddy path (vs SSH tunnel)
};

// Read-only helpers. Two sources of read-only:
//  - publicReadonly: reached over the public Caddy reverse proxy -> ALL management
//    is disabled (server-enforced too); management requires the SSH tunnel.
//  - the selected node is an external docker container we don't manage.
function curNode(){ return state.nodes[state.node] || {}; }
function isReadonly(){ return state.publicReadonly || curNode().mode === 'external'; }
// A server runs a single Telcoin node (observer OR validator, never both), so the
// first installed type is THE node on this host. Returns 'observer'/'validator',
// or null on a fresh server with nothing installed.
function installedType(){
  for(const t of ['observer','validator']) if(state.nodes[t]?.installed) return t;
  return null;
}
// Switch the active node tab programmatically (mirrors the #selector click handler).
function selectNode(t){
  if(!state.nodes[t]) return;
  state.node = t;
  document.querySelectorAll('.node-btn').forEach(n=>n.classList.toggle('active', n.dataset.node===state.node));
  rerenderActive();
}
function updateReadonlyBanner(){
  const b = $('#roBanner'), m = $('#roBannerMsg'); if(!b || !m) return;
  if(state.publicReadonly){
    m.innerHTML = '<strong style="color:var(--yellow)">🔒 Read-only (public access).</strong> '
      + 'Management is disabled over the public dashboard. Connect via the SSH tunnel '
      + '(localhost) to manage this node.';
    b.style.display = 'block';
  } else if(curNode().mode === 'external'){
    m.innerHTML = '<strong style="color:var(--yellow)">⚠ Monitoring only.</strong> '
      + 'This node was not installed via Telcoin Node Scripts (externally-deployed '
      + 'docker container). Management actions are disabled.';
    b.style.display = 'block';
  } else {
    b.style.display = 'none';
  }
}

const $ = (s,r=document)=>r.querySelector(s);
const el = (tag,cls,html)=>{const e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;};
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

async function api(path, opts){
  try{
    const r = await fetch(path, opts);
    return await r.json();
  }catch(e){ return {error:String(e)}; }
}

// =============================================================================
// Toasts
// =============================================================================
function toast(msg, type='info'){
  const t = el('div','toast '+type, esc(msg));
  $('#toasts').appendChild(t);
  setTimeout(()=>{ t.classList.add('out'); setTimeout(()=>t.remove(),300); }, 3000);
}

// =============================================================================
// Clock
// =============================================================================
function tickClock(){
  const d = new Date();
  const p = n => String(n).padStart(2,'0');
  $('#clock').textContent = `${p(d.getUTCHours())}:${p(d.getUTCMinutes())}:${p(d.getUTCSeconds())} UTC`;
}
setInterval(tickClock,1000); tickClock();

// =============================================================================
// Navigation
// =============================================================================
$('#nav').addEventListener('click', e=>{
  const tab = e.target.closest('.tab'); if(!tab) return;
  switchView(tab.dataset.view);
});
function switchView(v){
  state.view = v;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.view===v));
  document.querySelectorAll('.view').forEach(s=>s.classList.toggle('active', s.id==='view-'+v));
  stopAutoRefresh();
  stopLive();
  stopTracesRefresh();
  stopUpdateStream();
  stopConfigStream();
  if(v!=='config') state.configEditing=false;
  if(v==='dashboard'){ renderDashboard(); startAutoRefresh(); }
  if(v==='network'){ renderNetwork(); startAutoRefresh(); }
  if(v==='logs')   renderLogs();
  if(v==='config') renderConfig();
  if(v==='update') renderUpdate();
  if(v==='traces'){ renderTraces(); startTracesRefresh(); }
  if(v==='setup')  renderSetup();
  if(v==='system') renderSystem();
}

$('#selector').addEventListener('click', e=>{
  const b = e.target.closest('.node-btn'); if(!b) return;
  selectNode(b.dataset.node);
});

$('#refreshBtn').addEventListener('click', ()=>{ loadNodes(); rerenderActive(); });

function rerenderActive(){
  updateReadonlyBanner();
  syncReadonlyChrome();
  // Setup has no meaning for an already-installed (or read-only) node; bounce to
  // Dashboard if it's selected.
  if(state.view==='setup' && setupHidden()){ switchView('dashboard'); return; }
  if(state.view==='dashboard') renderDashboard();
  if(state.view==='network') renderNetwork();
  if(state.view==='logs')   renderLogs();
  if(state.view==='config') renderConfig();
  if(state.view==='update') renderUpdate();
  if(state.view==='traces') renderTraces();
  if(state.view==='system') renderSystem();
  if(state.view==='setup')  renderSetup();
}

// =============================================================================
// Node selector status
// =============================================================================
async function loadNodes(fresh){
  // fresh=true bypasses the server's ~10s detect cache (used right after a setup
  // finalize so the new node is detected immediately).
  const d = await api('/api/nodes' + (fresh ? '?fresh=1' : ''));
  if(d && !d.error){ state.nodes = d; state.publicReadonly = !!d.public_readonly; }
  for(const t of ['observer','validator']){
    const n = state.nodes[t] || {installed:false,status:'not installed'};
    const dot = $('#dot-'+t), st = $('#stat-'+t);
    st.textContent = n.installed ? n.status : 'not installed';
    dot.className = 'dot ' + (n.status==='active'?'green':(n.installed?'red':'gray'));
  }
  updateReadonlyBanner();
  syncReadonlyChrome();
}

// After any mutating action (config save, service control, settings toggle),
// refresh node state AND re-render the active view so the change shows
// immediately, not only on the next 15s auto-refresh tick.
async function refreshAfterChange(){ await loadNodes(); rerenderActive(); }

// Hide controls/tabs with no meaning in read-only mode. System (host admin:
// firewall, log rotation, external access, remove) is hidden on the public path;
// it stays available for an external-node-only case (host info is still useful).
// Setup INSTALLS a node, and a server runs exactly one node (observer OR
// validator). So Setup is shown ONLY on a fresh server with nothing installed --
// hidden once any node exists (the other tab shows "already configured") and in
// read-only (external/public) mode.
function setupHidden(){ return isReadonly() || installedType() !== null; }

function syncReadonlyChrome(){
  const setupTab = document.querySelector('.tab[data-view="setup"]');
  if(setupTab) setupTab.style.display = setupHidden() ? 'none' : '';
  const systemTab = document.querySelector('.tab[data-view="system"]');
  if(systemTab) systemTab.style.display = state.publicReadonly ? 'none' : '';
}

// =============================================================================
// Empty state
// =============================================================================
function emptyState(container, what){
  // A server runs a single node. If THIS type isn't installed but the OTHER one
  // is, this server is already configured -- don't invite a second install; point
  // the operator at the node that's actually running here.
  const inst = installedType();
  if(inst && inst !== state.node){
    const e = el('div','empty', `
      <div class="ei">✅</div>
      <h2>This server is configured as a ${esc(cap(inst))} node</h2>
      <p>Each server runs a single Telcoin node. There is no ${esc(String(what).toLowerCase())} here —
         select the <strong>${esc(cap(inst))}</strong> tab to manage this node.</p>
      <button class="btn btn-out" onclick="selectNode('${inst}')">Go to ${esc(cap(inst))} →</button>
    `);
    container.innerHTML=''; container.appendChild(e);
    return;
  }
  const e = el('div','empty', `
    <div class="ei">📦</div>
    <h2>${esc(what)} not installed</h2>
    <p>This node type isn't set up on this server yet. Use the Setup wizard to review requirements and get the install command.</p>
    <button class="btn btn-out" onclick="switchView('setup')">Go to Setup →</button>
  `);
  container.innerHTML=''; container.appendChild(e);
}

// =============================================================================
// DASHBOARD
// =============================================================================
function statCard(label, val, valCls, meta, bar, cardCls, spark){
  let barHtml='';
  if(bar){
    const cls = bar.pct>=90?'crit':(bar.pct>=75?'warn':'');
    barHtml = `<div class="bar"><span class="${cls}" style="width:${Math.max(0,Math.min(100,bar.pct))}%"></span></div>`;
  }
  return `<div class="card stat ${cardCls||''}">
    <div class="label">${esc(label)}</div>
    <div class="val ${valCls||''}">${val}</div>
    ${meta?`<div class="meta">${meta}</div>`:''}
    ${barHtml}
    ${spark||''}
  </div>`;
}

// =============================================================================
// Sparklines -- in-memory, per-node rolling history (resets on page reload).
// Pure inline SVG, no deps, no axes/labels/tooltips. History is keyed
// "<node>:<metric>" so switching node tabs never splices two nodes' series.
// Only finite samples are stored; a missing reading is SKIPPED (never pushed as
// 0, which would draw a false drop to zero).
// =============================================================================
const SPARK_MAX = 30;
const sparkHistory = {};   // "<node>:<metric>" -> number[]

function sparkPush(metric, value){
  if(value==null || !isFinite(value)) return;
  const key = state.node + ':' + metric;
  const arr = sparkHistory[key] || (sparkHistory[key] = []);
  arr.push(Number(value));
  if(arr.length > SPARK_MAX) arr.shift();
}
function sparkGet(metric){ return sparkHistory[state.node + ':' + metric] || []; }
// Per-interval deltas of a monotonic counter (e.g. consensus block) -> a
// throughput series that dips visibly when the node falls behind. max(0,…)
// guards a counter reset (node restart / rollback).
function sparkDeltas(metric){
  const a = sparkGet(metric), d = [];
  for(let i=1;i<a.length;i++) d.push(Math.max(0, a[i]-a[i-1]));
  return d;
}

// Render one or more series sharing a single auto-scaled y-range into a
// full-width 36px SVG. series = [{data:number[], color:'var(--accent)'}].
// Returns '' until the longest drawn series has >=3 points.
let _sparkSeq = 0;
function sparkSVG(series){
  series = (series||[]).filter(s=>s && s.data && s.data.length>=2);
  const longest = Math.max(0, ...series.map(s=>s.data.length));
  if(longest < 3) return '';
  const w=300, h=36, pad=2;
  let lo=Infinity, hi=-Infinity;
  for(const s of series) for(const v of s.data){ if(v<lo) lo=v; if(v>hi) hi=v; }
  if(!isFinite(lo)||!isFinite(hi)) return '';
  const range = (hi-lo) || 1;
  const gid = 'spk'+(++_sparkSeq);   // unique per call -> no duplicate DOM ids
  const xy = data => data.map((v,i)=>{
    const x = data.length>1 ? (i/(data.length-1))*w : 0;
    const y = h - ((v-lo)/range)*(h-2*pad) - pad;
    return x.toFixed(1)+','+y.toFixed(1);
  });
  const base = xy(series[0].data);
  const fillD = `M 0,${h} L ${base.join(' L ')} L ${w},${h} Z`;
  // CSS vars resolve in `style=` (not in presentation attributes), so colour via style.
  let paths = `<path d="${fillD}" fill="url(#${gid})"/>`;
  for(const s of series){
    const pts = xy(s.data);
    paths += `<path d="M ${pts.join(' L ')}" fill="none" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke" style="stroke:${s.color}"/>`;
  }
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:36px;display:block;margin-top:12px">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:${series[0].color};stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:${series[0].color};stop-opacity:0"/>
    </linearGradient></defs>
    ${paths}
  </svg>`;
}

// Peer-count tile. 0 peers -> amber value + "no peers" (it's a problem worth
// flagging); >0 -> accent value + the positive meta ("connected" by default);
// null/undefined (e.g. Worker Peers on an external node, which reports only a
// total) -> "—" with a neutral meta.
function peerCard(label, count, metaPositive, metaUnknown, spark){
  if(count==null) return statCard(label, '—', '', metaUnknown||'not reported', null, '', spark||'');
  const n = Number(count);
  const zero = !(n > 0);
  return statCard(label, esc(String(count)), zero?'yellow':'accent',
                  zero?'no peers':(metaPositive||'connected'), null, '', spark||'');
}
// Green when the node has peers, amber when it has none -- the line colour
// reflects the CURRENT peer state, so a drop to zero recolours the trend.
function peerSparkColor(count){ return (Number(count)>0) ? 'var(--green)' : 'var(--yellow)'; }

// Recent Log Events table (last 5 ERROR/WARN, most recent first). Styled like
// the dashboard tables (.tbl): dark bg, row dividers, mono font. Message wraps.
function logEventsTable(events){
  const head = `<thead><tr><th>Time</th><th>Level</th><th>Target</th><th>Message</th></tr></thead>`;
  if(!events || !events.length){
    return `<table class="tbl logtbl">${head}<tbody><tr>
      <td colspan="4"><span style="color:var(--green)">No recent errors or warnings</span></td></tr></tbody></table>`;
  }
  const rows = events.map(e=>{
    const badge = e.level==='error'
      ? '<span class="badge err">ERROR</span>'
      : '<span class="badge warn">WARN</span>';
    return `<tr>
      <td>${esc(e.time||'—')}</td>
      <td>${badge}</td>
      <td title="${esc(e.target||'')}">${esc(e.target||'—')}</td>
      <td>${esc(e.msg||'')}</td>
    </tr>`;
  }).join('');
  return `<table class="tbl logtbl">${head}<tbody>${rows}</tbody></table>`;
}

// Record the selected node's network identity (chain id -> name/slug/configured)
// from /api/status, so the nav pill, Network card and Network tab render it.
function setNetworkFromStatus(s){
  if(!s || s.installed===false) return;
  state.network = { chainId: s.chain_id, name: s.network||'', slug: s.network_slug||'',
                    configured: !!s.network_configured };
}

// Service-row controls. An external (read-only) node shows a "monitoring only"
// badge in place of start/stop/restart.
function svcControls(s, running){
  if(isReadonly())
    return '<span class="badge" style="background:rgba(122,154,184,0.15);color:var(--text2)">monitoring only</span>';
  return `${!running?`<button class="btn btn-green" data-act="start">▶ Start</button>`:''}`
       + `${running?`<button class="btn btn-red" data-act="stop">■ Stop</button>`:''}`
       + `<button class="btn btn-out" data-act="restart">↻ Restart</button>`;
}

// Quick-actions block; the mutating entries (Edit Config, Restart, Update) drop
// out for an external node.
// Quick Actions are shortcuts to common destinations -- NOT service control
// (Start/Stop/Restart live in the service-control row just above this). Write-only
// shortcuts drop out in read-only mode.
function quickActionsHtml(){
  const ro = isReadonly();
  return `<button class="btn btn-out" onclick="switchView('logs')">📜 View Logs</button>`
    + `<button class="btn btn-out" onclick="switchView('network')">🌐 Network Status</button>`
    + `<button class="btn btn-out" onclick="switchView('traces')">🔍 Tracing</button>`
    + (ro?'':`<button class="btn btn-out" onclick="switchView('config')">⚙ Edit Config</button>`)
    + (ro?'':`<button class="btn btn-out" onclick="switchView('update')">⬆ Check for Update</button>`);
}

// Extra Node Details rows for an external (docker) node: container + image.
function externalDetailRows(s){
  // Container + Image are docker concepts -- only meaningful for an externally
  // deployed (docker) node. Don't show them on scripts-installed nodes, even
  // when viewed read-only over the public dashboard (where isReadonly() is true).
  if(s.mode !== 'external') return '';
  return `<div class="kv"><span class="k">Container</span><span class="v">${esc(s.container||'—')}</span></div>`
    + `<div class="kv"><span class="k">Image</span><span class="v" style="overflow-wrap:anywhere;word-break:break-word">${esc(s.image||'—')}</span></div>`;
}

async function renderDashboard(){
  const c = $('#view-dashboard');
  if(!state.nodes[state.node]?.installed){ emptyState(c, cap(state.node)); return; }
  // Validator gets its own consensus/on-chain dashboard; observer view unchanged.
  if(state.node==='validator'){ await renderValidatorDashboard(c); return; }
  if(!c.dataset.loaded) c.innerHTML = `<div class="card">Loading ${esc(state.node)} status…</div>`;

  const s = await api('/api/status/'+state.node);
  if(s.error || s.installed===false){ emptyState(c, cap(state.node)); return; }
  c.dataset.loaded='1';
  setNetworkFromStatus(s);

  const running = s.status==='active';
  const peers = s.peers||{};
  const cons = s.consensus||{};
  const disk = s.disk||{};
  const mem = s.memory||{};

  // Restart count tile colour: 0 green, 1-3 yellow, 4+ red.
  const rc = s.restart_count;
  const rcCls = rc==null?'':(rc>=4?'red':(rc>=1?'yellow':'green'));

  // CPU tile (share of total capacity): >90 red, >70 yellow.
  const cpu = s.cpu_percent;
  const cpuCls = cpu==null?'':(cpu>90?'red':(cpu>70?'yellow':''));

  // Network consensus block number (public RPC tn_latestConsensusHeader).
  // int -> show with commas; null -> RPC unavailable.
  const ncb = s.network_consensus_block;          // number or null
  const nbAvail = ncb!=null;
  const nbVal = nbAvail ? fmtNum(ncb) : '—';
  const nbCls = nbAvail ? 'accent' : '';
  const nbMeta = nbAvail ? 'via public RPC' : 'rpc unavailable';

  // Consensus lag = local - network. +N ahead, -N behind, 0 in sync.
  const lag = s.consensus_lag;
  let lagVal='—', lagCls='', lagMeta;
  if(!nbAvail){ lagVal='—'; lagMeta='rpc unavailable'; }
  else if(lag==null){ lagVal='—'; lagMeta='network block '+fmtNum(ncb); }
  else {
    const a=Math.abs(lag);
    if(lag===0){ lagVal='In sync'; lagCls='green'; }
    else { lagVal=(lag>0?'+':'-')+fmtNum(a)+' blocks'; lagCls=a<100?'green':(a<=1000?'yellow':'red'); }
    lagMeta='network block '+fmtNum(ncb);
  }

  // Epoch: the tile value is the LOCAL node's epoch; the subtitle compares it to
  // the network's current epoch so a syncing node's progress is visible.
  const localEpoch = cons.epoch!=null ? Number(cons.epoch) : null;
  const netEpoch   = s.network_epoch!=null ? Number(s.network_epoch) : null;
  let epochVal = localEpoch!=null ? fmtNum(localEpoch) : '—';
  let epochCls = 'accent', epochMeta;
  if(s.consensus_unsupported && localEpoch==null){ epochMeta='unavailable on this version'; }
  else if(netEpoch==null){ epochMeta = localEpoch!=null ? 'local node epoch' : 'no data'; }
  else if(localEpoch==null){ epochMeta='network epoch '+fmtNum(netEpoch); }
  else {
    const behind = netEpoch - localEpoch;
    if(behind<=0){ epochMeta='network '+fmtNum(netEpoch)+' · in sync'; epochCls='green'; }
    else { epochMeta='network '+fmtNum(netEpoch)+' · '+fmtNum(behind)+' behind'; epochCls='yellow'; }
  }

  // Monitoring tiles.
  const errc = s.log_error_count_1h;
  const errCls = errc==null?'':(errc>10?'red':(errc>0?'yellow':'green'));
  const warnc = s.log_warn_count_1h;
  const warnCls = warnc==null?'':(warnc>10?'red':(warnc>0?'yellow':'green'));
  const lastRestart = s.last_restart;
  const lrVal = lastRestart ? `<span style="font-size:14px">${esc(lastRestart)}</span>` : '—';
  const logSize = s.log_size_human;
  // Log size colour: <500MB normal/green, 500MB-1GB amber, >1GB red.
  const logBytes = s.log_size;
  const logCls = logBytes==null ? '' : (logBytes>1073741824 ? 'red' : (logBytes>=524288000 ? 'yellow' : 'green'));

  // Sparkline samples for this refresh (per-node history; nulls skipped).
  sparkPush('cpu', cpu);
  sparkPush('consBlock', cons.block!=null ? Number(cons.block) : null);
  sparkPush('peers', peers.primary!=null ? Number(peers.primary) : null);

  c.innerHTML = `
  <div class="dash">
    <!-- service control (full width) -->
    <div class="card">
      <div class="svc-row" id="svcRow">
        <span class="pill ${running?'green':'red'}" id="svcPill">● ${esc(s.status)}</span>
        ${svcControls(s, running)}
        <span id="jaegerInd" class="mono" style="font-size:12px;color:var(--text2);margin-left:14px"><span class="jdot gray"></span>Jaeger</span>
        <span id="updInd" class="mono" style="font-size:12px;color:var(--text2);margin-left:14px"></span>
        <span class="uptime">${s.uptime?'Since '+esc(s.uptime):''}</span>
      </div>
    </div>

    <!-- sections, full width single column; each grid fills the row edge-to-edge -->
    <div class="group-label">Service Health</div>
    <div class="dgrid dgrid-4">
      ${statCard('Service', running?'Active':'Inactive', running?'green':'red', 'telcoin-'+esc(state.node))}
      ${statCard('Uptime', s.uptime_human?esc(s.uptime_human):'—', '', running?'⏱ running time':'not running')}
      ${statCard('Restart Count', rc!=null?esc(String(rc)):'—', rcCls, 'since current install')}
      ${statCard('Local RPC', s.rpc_ok?'Online':'Offline', s.rpc_ok?'green':'red', 'port '+esc(s.rpc_port))}
    </div>

    <div class="group-label">Sync State</div>
    <div class="dgrid dgrid-6">
      ${statCard('EVM Block', s.block_number!=null?fmtNum(s.block_number):'—', 'accent', s.block_number!=null?(s.synced?'<span style="color:var(--green)">synced</span>':'<span style="color:var(--yellow)">syncing</span>'):'no data')}

// metrics come from /api/status; validator-specific consensus + contract data
// from /api/validator. Reuses the observer tile IDs (#netTrafficTile, #jaegerTile/
// #jaegerInd, #updInd, #verDetail, #consTrace) so the same augment* helpers fill

// Decode the on-chain validator status into a hero {cls,main,sub}. Mirrors the
// ValidatorStatus enum (lib/common.sh): 0 Undefined, 1 Staked, 2 PendingActivation,
// 3 Active, 4 PendingExit, 5 Exited, 6 Any(retired).
function valStatusHero(v){
  const st = v.status;                          // int or null
  const retired = v.is_retired===true || st===6;
  const nft = v.nft_held;                        // true/false/null
  if(retired)   return {cls:'red',  main:'Retired',           sub:'Exited and retired from the validator set'};
  if(st===3)    return {cls:'green',main:'Active',            sub:'Participating in consensus'};
  if(st===2)    return {cls:'amber',main:'Pending Activation',sub:'Activating at the next epoch boundary'};
  if(st===1)    return {cls:'amber',main:'Staked',            sub:'Staked — call activate() to enter the activation queue'};
  if(st===4)    return {cls:'amber',main:'Pending Exit',      sub:'Exiting at the next epoch boundary'};
  if(st===5)    return {cls:'red',  main:'Exited',            sub:'No longer in the active validator set'};
  if(st===0)    return {cls:'red',  main:'Not Staked',        sub:'ConsensusNFT present — stake your TEL to begin'};
  if(nft===false) return {cls:'red',main:'Not Registered',    sub:'No ConsensusNFT — awaiting governance approval'};
  return {cls:'red', main:'—', sub:'On-chain status unavailable'};
}

// Lazy: fill the Network Traffic tile from /api/netstat (its own 1s-sampled
// endpoint). Runs on every dashboard render, so rates update each refresh cycle.
async function augmentDashboardNetstat(){
  if(!$('#netTrafficTile')) return;
  const d = await api('/api/netstat');
  if(state.view!=='dashboard') return;
  const tile=$('#netTrafficTile'), meta=$('#netTrafficMeta');
  if(!tile || !meta) return;
  if(!d || d.error || !d.iface){
    tile.textContent = '—';
    meta.textContent = 'no interface';
    return;
  }
  tile.innerHTML = `↓ ${esc(d.rx_rate||'—')}<br>↑ ${esc(d.tx_rate||'—')}`;
  meta.innerHTML = `${esc(d.iface)} · total ↓ ${esc(d.rx_total||'—')} · ↑ ${esc(d.tx_total||'—')}`;
  // Sparkline: download (accent) + upload (accent2) overlaid on one shared scale,
  // from the raw byte rates (not the human strings). 0 is a real sample here.
  sparkPush('netIn', d.rx_rate_bytes);
  sparkPush('netOut', d.tx_rate_bytes);
  const sp = $('#netTrafficSpark');
  if(sp) sp.innerHTML = sparkSVG([
    {data:sparkGet('netIn'),  color:'var(--accent)'},
    {data:sparkGet('netOut'), color:'var(--accent2)'},
  ]);
}

// NETWORK TAB -- Adiri Testnet status panel (moved off the Dashboard). Pulls
// the public status page (cached 60s server-side); refreshes on the 15s tick;
// degrades to a grey "status unavailable" state, never an error. Same page
// layout style as the Dashboard (.dash container).
// =============================================================================
async function renderNetwork(){
  const c = $('#view-network');
  if(!c) return;
  if(!c.dataset.loaded) c.innerHTML = '<div class="dash"><div class="card">Loading network status…</div></div>';
  const slug = state.network.slug || '';
  const d = await api('/api/network/status' + (slug?('?slug='+encodeURIComponent(slug)):''));
  setNavNetPill(d);   // keep the nav-bar pill in sync from the same fetch
  if(state.view!=='network') return;
  c.dataset.loaded='1';

  const netName = state.network.name || d.title || 'Network';

  // No status page is configured for this network (e.g. an unrecognised chain).
  if(d && d.configured===false){
    c.innerHTML = `<div class="dash"><div class="card"><h3>Network Status</h3>
      <p class="muted" style="font-size:13px;margin-top:8px">Network status page not configured for this network${netName?(' (<strong>'+esc(netName)+'</strong>)'):''}.</p></div></div>`;
    return;
  }

  if(!d || d.error || d.available===false){
    c.innerHTML = `<div class="dash"><div class="card"><h3>Network Status</h3>
      <div class="kv"><span class="k">${esc(netName)}</span>
        <span class="v"><span class="badge" style="background:rgba(122,154,184,0.15);color:var(--text2)">status unavailable</span></span></div>
      <p class="muted" style="font-size:12px;margin-top:8px">Could not reach the public status page (status.telscan.xyz).</p></div></div>`;
    return;
  }

  const ov = d.overall;
  const pill = ov==='up'       ? '<span class="pill green">● All Systems Operational</span>'
             : ov==='degraded' ? '<span class="pill busy">● Degraded</span>'
             : ov==='down'     ? '<span class="pill red">● Outage</span>'
             :                   '<span class="pill">● Unknown</span>';

  const cb = d.consensus_block;
  let consensusRow = '';
  if(cb){
    const cbUp = cb.status===1;
    const cbMeta = [
      cbUp ? 'up' : 'down',
      cb.ping!=null ? esc(String(cb.ping))+' ms' : null,
      cb.uptime!=null ? esc(String(cb.uptime))+'% up' : null,
      cb.last_seen ? 'last seen '+esc(cb.last_seen) : null,
    ].filter(Boolean).join(' · ');
    consensusRow = `<div class="kv" style="align-items:center">
      <span class="k">${esc(cb.name||'Consensus Block Progress')}</span>
      <span class="v"><span class="dot ${cbUp?'green':'red'}" style="display:inline-block;margin-right:8px;vertical-align:middle"></span>${cbMeta}</span>
    </div>`;
  }

  const cells = (d.monitors||[]).map(m=>{
    const up = m.status===1;
    return `<div style="background:var(--bg);border:var(--border);border-radius:10px;padding:12px">

// avg trace duration into the Consensus Block card meta.
async function augmentDashboardJaeger(s){

  // enabled/disabled for the selected node.

    } else {
      jm.textContent = 'tracing —';

  if(state.view!=='dashboard' || j.error) return;

    ind.innerHTML = '<span class="jdot '+(j.container_running?'green':'gray')+'"></span>Jaeger '+(j.container_running?'up':'off');

}

// Download the complete log file from disk (server streams it as an attachment
// named telcoin-<type>.log), regardless of the current viewer filter.
function downloadFullLog(){
  window.location.href = '/api/logs/'+state.node+'/download';
}

async function clearLog(){
  if(!window.confirm('This will permanently clear the log file. This cannot be undone. Are you sure?')) return;
  const r = await api('/api/logs/'+state.node+'/clear', {method:'POST'});
  if(r.ok){
    toast(cap(state.node)+' log cleared','success');
    state.logBuffer = [];
    loadLogLines();
  } else {
    toast('Clear failed: '+(r.error||'unknown error'),'error');
  }
}

function colorize(line){
  const l = line.toLowerCase();
  let cls='';
  if(/error/i.test(line)) cls='err';
  else if(/warn/i.test(line)) cls='warn';
  else if(/\[ok\]|success/i.test(line)) cls='ok';
  else if(/info/i.test(line)) cls='info';
  return `<div class="log-line ${cls}">${esc(line)}</div>`;
}

// Coarse level for the filter dropdown -- mirrors colorize()'s precedence
// (error > warn > everything-else) so the filter and the colours agree.
function lineLevel(line){
  if(/error/i.test(line)) return 'error';
  if(/warn/i.test(line)) return 'warn';
  return 'info';
}

function logMatches(line){
  const f = state.logFilter;
  if(f.level!=='all' && lineLevel(line)!==f.level) return false;
  if(f.search && !line.toLowerCase().includes(f.search.toLowerCase())) return false;
  return true;
}

function visibleLogLines(){ return state.logBuffer.filter(logMatches); }

// Render the buffer through the active filter. Used by the static fetch and on
// every filter change; live streaming appends incrementally (see startLive).
function renderLogBuffer(){
  const body = $('#logBody'); if(!body) return;
  const lines = visibleLogLines();
  if(!lines.length){
    body.innerHTML = state.logBuffer.length ? '<div class="muted">No lines match the filter.</div>'
                                            : '<div class="muted">No log output.</div>';
    return;
  }
  body.innerHTML = lines.map(colorize).join('');
  body.scrollTop = body.scrollHeight;
}

async function loadLogLines(){
  const body = $('#logBody'); if(!body) return;
  const n = $('#logLines').value;
  const d = await api(`/api/logs/${state.node}?lines=${n}`);
  state.logBuffer = (d && d.lines) || [];
  renderLogBuffer();
}

function copyLogs(){
  const txt = visibleLogLines().join('\n');
  if(!txt){ toast('No lines to copy','error'); return; }
  navigator.clipboard?.writeText(txt).then(
    ()=>toast('Logs copied to clipboard','success'),
    ()=>toast('Copy failed','error'));
}

function downloadLogs(){
  const txt = visibleLogLines().join('\n');
  if(!txt){ toast('No lines to download','error'); return; }
  const stamp = new Date().toISOString().replace(/:/g,'-').replace(/\.\d+Z$/,'Z');
  const blob = new Blob([txt+'\n'], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `telcoin-${state.node}-${stamp}.log`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(a.href);
}

function toggleLive(){ state.live ? stopLive() : startLive(); }

function startLive(){
  const body = $('#logBody'); if(!body) return;
  state.live = true;
  $('#liveBtn').innerHTML = '<span class="live-dot"></span> Stop';
  $('#liveStatus').innerHTML = '<span class="live-dot"></span> LIVE';
  state.logBuffer = [];
  body.innerHTML='';
  state.es = new EventSource(`/api/logs/${state.node}/stream`);
  state.es.onmessage = ev=>{
    // Keep every line in the buffer (so filtering never loses lines), but only
    // paint the ones that pass the active filter.
    state.logBuffer.push(ev.data);
    while(state.logBuffer.length>2000) state.logBuffer.shift();
    if(logMatches(ev.data)){
      body.insertAdjacentHTML('beforeend', colorize(ev.data));
      while(body.children.length>1000) body.removeChild(body.firstChild);
      body.scrollTop = body.scrollHeight;
    }
  };
  state.es.onerror = ()=>{ /* keep open; browser auto-reconnects */ };
}

function stopLive(){
  if(state.es){ state.es.close(); state.es=null; }
  if(state.live){
    state.live=false;
    const b=$('#liveBtn'), st=$('#liveStatus');
    if(b) b.innerHTML='● Live';
    if(st) st.textContent='';
  }
}

// External multiaddr cell: base address on the main line, the /p2p/<peerID>
// portion below it in a smaller dimmer font, truncated (~20 chars) with the
// full peer ID on hover. Plain value (escaped) when there's no /p2p/ segment.
function fmtMultiaddrCell(v){
  if(!v) return '—';
  const idx = v.indexOf('/p2p/');
  if(idx < 0) return esc(v);
  const base = v.slice(0, idx);
  const pid = v.slice(idx + 1);                 // "p2p/12D3KooW..."
  const short = pid.length > 20 ? pid.slice(0, 20) + '…' : pid;
  return `${esc(base)}<br><span class="mono" style="font-size:11px;color:var(--text3)" title="${esc(pid)}">${esc(short)}</span>`;
}

// Same split display as fmtMultiaddrCell, but sized for a stat-card value (the
// big .val font overflows the card with a full multiaddr). Base address wraps on
// the main line; the /p2p/ peer id sits below in smaller, dimmer, truncated text.
function fmtMultiaddrTile(v){
  if(!v) return '—';
  const idx = v.indexOf('/p2p/');
  const base = idx < 0 ? v : v.slice(0, idx);
  let pidHtml = '';
  if(idx >= 0){
    const pid = v.slice(idx + 1);
    const short = pid.length > 20 ? pid.slice(0, 20) + '…' : pid;
    pidHtml = `<br><span style="font-size:11px;color:var(--text3)" title="${esc(pid)}">${esc(short)}</span>`;
  }
  return `<span class="mono" style="font-size:12px;line-height:1.4;display:inline-block;overflow-wrap:anywhere;word-break:break-word;white-space:normal">${esc(base)}${pidHtml}</span>`;
}

// Editable field allowlist (mirrors edit-config.sh --json + server.py). Each
// row carries a value validator so we reject bad input before streaming.
function configValueOk(field, value){
  if(field==='primary_listener'||field==='worker_listener') return /^\/(ip4|ip6)\/[^/]+\/udp\/[0-9]+\/quic-v1$/.test(value);
  if(field==='instance') return /^[1-9]$/.test(value);
  if(field==='metrics') return /^(\d{1,3}\.){3}\d{1,3}:\d{1,5}$/.test(value);
  if(field==='verbosity') return /^-v{1,5}$/.test(value);
  if(field==='docker_image') return /^[A-Za-z0-9._/:@-]+$/.test(value) && value.includes(':');
  return false;
}

// One editable row: label + input/select + per-field Save (each save is one
// daemon-reload + restart + health verify, exactly like the CLI menu).
function cfgEditRow(field, label, current, kind){
  let control;
  if(kind==='verbosity'){
    const opts=[['','— choose level —'],['-v','ERROR (-v)'],['-vv','WARN (-vv)'],['-vvv','INFO (-vvv)'],['-vvvv','DEBUG (-vvvv)'],['-vvvvv','TRACE (-vvvvv)']];
    control=`<select id="cfg_${field}">${opts.map(([v,l])=>`<option value="${esc(v)}">${esc(l)}</option>`).join('')}</select>`;
  } else if(kind==='instance'){
    control=`<select id="cfg_${field}">${['1','2','3','4','5','6','7','8','9'].map(v=>`<option value="${v}" ${v===String(current)?'selected':''}>${v}</option>`).join('')}</select>`;
  } else {
    control=`<input id="cfg_${field}" value="${esc(current||'')}" autocomplete="off">`;
  }
  return `<div class="kv" style="align-items:center">
    <span class="k">${esc(label)}</span>
    <span class="v" style="display:flex;gap:8px;align-items:center;justify-content:flex-end;flex-wrap:wrap">
      ${control}
      <button class="btn btn-green" data-cfg-save="${field}">Save</button>
    </span></div>`;
}

// Save the node-log rotation size (global logrotate config).
async function saveLogRotate(btn){
  const t = state.node;
  const size = ($('#logRotSize')?.value||'').trim().toUpperCase();
  if(!/^[0-9]+[KMG]$/.test(size)){ toast('Invalid size — use e.g. 500M or 1G','error'); return; }
  if(btn){ btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Saving…'; }
  const r = await api('/api/config/'+t+'/logrotate', {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({size}),
  });

  else toast('Failed to set log rotation: '+((r&&r.error)||'unknown error'),'error');

// Save the Advertised Node Name (network-config hostname) via its own route --
// it edits a different file than the rest of config, then restarts the node.
async function saveAdvertisedName(btn){
  const t = state.node;
  const name = ($('#advName')?.value||'').trim();
  const current = btn?.dataset.current || '';
  const label = current ? 'Change' : 'Save';
  if(!/^[A-Za-z0-9][A-Za-z0-9._-]{0,63}$/.test(name)){
    toast('Invalid name — letters, digits, . _ - ; start alphanumeric; max 64','error'); return;
  }
  if(name === current){ toast('That is already the advertised name','info'); return; }
  // Changing an existing name needs an explicit confirm; first-time set only
  // confirms the validator restart.
  if(current){
    const msg = t==='validator'
      ? `Are you sure you want to change the Advertised node name to "${name}"? This restarts the validator now — brief downtime, missed consensus rounds.`
      : `Are you sure you want to change the Advertised node name to "${name}"? This restarts the node now.`;
    if(!confirm(msg)) return;
  } else if(t==='validator' && !confirm('Set the advertised name and restart the validator now? This causes brief downtime.')) {
    return;
  }
  if(btn){ btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Saving…'; }

function saveConfigField(field, value, btn){
  if(!configValueOk(field, value)){ toast('Invalid value for '+field, 'error'); return; }

     !confirm('Saving restarts the validator now — expect missed consensus rounds during the brief downtime. Continue?')) return;

// Shared SSE-line formatter for the Update + Config progress panes. Returns the
// HTML for one {event:step|error|done} line, or null for anything else.
function streamLineHtml(d){
  let cls='info', text='';
  if(d.event==='error'){ cls='err'; text='✗ '+(d.msg||''); }
  else if(d.event==='step'){ cls='info'; text='» '+(d.msg||''); }
  else if(d.event==='log'){
    // Raw command output (git clone / cargo build) streamed live so the build
    // doesn't look frozen. Dim by default; tint compiler errors/warnings.
    text = d.msg||''; if(!text) return null;
    cls = /error(\[|:)/i.test(text) ? 'err' : (/warning:/i.test(text) ? 'warn' : 'muted');
  }
  else if(d.event==='done'){
    const detail = d.new_version || d.new_image || d.new_ref || d.value || '';
    cls = d.ok ? 'ok' : 'err';
    text = (d.ok?'✓ ':'✗ ') + (d.msg || ((d.phase||d.field||'done')+(detail?': '+detail:'')));
  } else return null;
  return `<div class="log-line ${cls}">${esc(text)}</div>`;
}

function appendStream(sel, d){
  const log=$(sel); if(!log) return;
  const h=streamLineHtml(d); if(!h) return;
  log.insertAdjacentHTML('beforeend', h);
  // Cap the DOM -- a source build streams thousands of lines.
  while(log.children.length>1500) log.removeChild(log.firstChild);
  log.scrollTop = log.scrollHeight;
}

function appendUpdateLine(d){ appendStream('#updLog', d); }

function startUpdateStream(kind, ref){
  stopUpdateStream();
  const card=$('#updProgressCard'); if(card) card.style.display='block';
  const log=$('#updLog'); if(log) log.innerHTML='<div class="log-line info">» starting '+esc(kind)+'…</div>';
  let url = '/api/update/'+kind+'/'+state.node;
  if(kind==='prepare') url += '?ref='+encodeURIComponent(ref);
  // EventSource is GET-only, so prepare/apply are exposed as GET SSE endpoints.
  state.updateES = new EventSource(url);
  state.updateES.onmessage = ev=>{
    let d; try{ d=JSON.parse(ev.data); }catch(e){ return; }
    if(d.event==='closed'){ stopUpdateStream(); fillUpdateStatus(); loadNodes(); return; }
    appendUpdateLine(d);
    if(d.event==='done'){
      if(d.ok) toast('Update '+kind+' succeeded','success');
      else toast('Update '+kind+(d.rolled_back?' failed — rolled back':' did not complete'),'error');
    }
  };
  state.updateES.onerror = ()=>{ /* server closes the stream when the script exits */ };
}

function stopUpdateStream(){ if(state.updateES){ state.updateES.close(); state.updateES=null; } }

async function discardUpdate(){
  const r = await api('/api/update/discard/'+state.node, {method:'POST'});
  if(r.ok) toast('Pending update discarded','success');
  else toast('Discard failed: '+(r.error||'unknown error'),'error');
  fillUpdateStatus();
}

const CADDY_DOMAIN_RE = /^[A-Za-z0-9.-]+$/;
const CADDY_USER_RE = /^[A-Za-z0-9._-]{2,32}$/;

async function renderCaddyCard(){
  const c = $('#caddyCard'); if(!c) return;

  const enabled = !!(s && s.enabled);
  // Monitoring-only (external/read-only) node: show status, never the controls --
  // consistent with the firewall/log-rotation cards and the "management disabled"
  // banner. (External access is a host action; manage it over the SSH tunnel.)
  if(isReadonly()){
    c.innerHTML = `

        ? `Public access is <strong>enabled</strong>${s.domain?` at <span class="mono">${esc(s.domain)}</span>`:''} (managed by the Node Manager).`
        : 'Public access is not configured via the Node Manager. To manage it, connect over the SSH tunnel from a node installed by Telcoin Node Scripts.'}</p>`;
    return;
  }
  if(enabled){
    c.innerHTML = `
      <h3>External Dashboard Access</h3>
      <p style="color:var(--text2);font-size:13px">This dashboard is reachable publicly via Caddy with a login. Public access is <strong>read-only</strong> — management actions stay on the SSH tunnel.</p>
      <div class="kv"><span class="k">Status</span><span class="v">${s.running?'<span class="badge ok">running</span>':'<span class="badge warn">configured</span>'}</span></div>
      <div class="kv"><span class="k">URL</span><span class="v">${s.domain?`<a href="https://${esc(s.domain)}" target="_blank" rel="noopener">https://${esc(s.domain)}</a>`:'—'}</span></div>
      <div class="kv"><span class="k">Login user</span><span class="v">${esc(s.username||'—')}</span></div>
      <div class="svc-row" style="margin-top:14px"><button class="btn btn-red" id="caddyDisable">Disable External Access</button></div>
      <div class="log-body" id="caddyLog" style="display:none;height:160px;white-space:pre-wrap;margin-top:10px"></div>`;
    const d=$('#caddyDisable'); if(d) d.addEventListener('click', caddyDisable);
  } else {
    c.innerHTML = `
      <h3>External Dashboard Access</h3>
      <p style="color:var(--text2);font-size:13px">Expose this dashboard at your own domain over HTTPS, behind Caddy with a login.
        <strong>First set a DNS A record</strong> pointing your domain at this server's public IP, then check propagation below before enabling
        (Caddy requests the TLS certificate on first start — if DNS isn't pointing here yet, issuance fails and Let's Encrypt rate-limits retries).
        Public access is <strong>read-only</strong>; management stays on the SSH tunnel.</p>
      <div class="field"><label>Dashboard domain</label><input id="caddyDomain" placeholder="dashboard.example.com" autocomplete="off"></div>
      <div class="field"><label>Login username</label><input id="caddyUser" value="admin" autocomplete="off"></div>
      <div class="grid two-col">
        <div class="field"><label>Password (min 8 chars)</label><input id="caddyPw" type="password" autocomplete="new-password"></div>
        <div class="field"><label>Confirm password</label><input id="caddyPw2" type="password" autocomplete="new-password"></div>
      </div>
      <div class="svc-row"><button class="btn btn-out" id="caddyDns">Check DNS</button><button class="btn btn-green" id="caddyEnable">Enable External Access</button></div>
      <div id="caddyDnsResult" style="margin-top:10px;font-size:13px"></div>
      <div class="log-body" id="caddyLog" style="display:none;height:200px;white-space:pre-wrap;margin-top:10px"></div>`;
    const dn=$('#caddyDns'); if(dn) dn.addEventListener('click', caddyDnsCheck);
    const en=$('#caddyEnable'); if(en) en.addEventListener('click', caddyEnable);
  }
}

async function caddyDnsCheck(){
  const domain=($('#caddyDomain').value||'').trim();
  const out=$('#caddyDnsResult'); if(!out) return;
  if(!CADDY_DOMAIN_RE.test(domain)){ out.innerHTML='<span style="color:var(--red)">Enter a valid domain first.</span>'; return; }
  out.innerHTML='Checking DNS…';
  const r = await api('/api/caddy/dns-check', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({domain})});
  if(!r || !r.ok){ out.innerHTML='<span style="color:var(--red)">DNS check failed'+(r&&r.error?': '+esc(r.error):'')+'</span>'; return; }
  if(r.propagated){
    out.innerHTML='<span style="color:var(--green)">✓ '+esc(domain)+' → '+esc(r.resolved_ip)+' (matches this server). Ready to enable.</span>';
  } else {
    out.innerHTML='<span style="color:var(--red)">✗ '+esc(domain)+' resolves to '+esc(r.resolved_ip||'nothing')+', expected '+esc(r.public_ip||'this server')+'.</span> '
      +'<span style="color:var(--text2)">Set the A record and wait for propagation (can take a few minutes). Enabling before it propagates may fail TLS issuance.</span>';
  }
}

async function caddyEnable(){
  const domain=($('#caddyDomain').value||'').trim();
  const username=($('#caddyUser').value||'').trim();
  const pw=$('#caddyPw').value||'', pw2=$('#caddyPw2').value||'';
  if(!CADDY_DOMAIN_RE.test(domain)) return toast('Enter a valid domain','error');
  if(!CADDY_USER_RE.test(username)) return toast('Username: 2–32 chars (letters, digits, . _ -)','error');
  if(pw.length<8) return toast('Password must be at least 8 characters','error');
  if(pw!==pw2) return toast('Passwords do not match','error');
  const btn=$('#caddyEnable'); if(btn) btn.disabled=true;
  const log=$('#caddyLog'); if(log){ log.style.display='block'; log.innerHTML='<div class="log-line info">» enabling external access… (the TLS certificate is issued on the first request — keep this tab open)</div>'; }
  const d = await streamCaddy('enable', {domain, username, password:pw});
  if(d && d.ok){ toast('External access enabled','success'); renderCaddyCard(); }
  else { toast('Enable failed'+(d&&d.msg?': '+d.msg:''),'error'); if(btn) btn.disabled=false; }
}

async function caddyDisable(){
  if(!confirm('Disable external dashboard access? The public URL will stop working.')) return;
  const btn=$('#caddyDisable'); if(btn) btn.disabled=true;
  const log=$('#caddyLog'); if(log){ log.style.display='block'; log.innerHTML='<div class="log-line info">» disabling external access…</div>'; }
  const d = await streamCaddy('disable', {});
  if(d && d.ok){ toast('External access disabled','success'); renderCaddyCard(); }
  else { toast('Disable failed'+(d&&d.msg?': '+d.msg:''),'error'); if(btn) btn.disabled=false; }
}

// POST + stream the SSE body (mirrors streamSetup) so the password never rides a URL.
async function streamCaddy(phase, payload){
  let resp;
  try{
    resp = await fetch('/api/caddy/'+phase, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
  }catch(e){ toast('Request failed: '+e,'error'); return null; }
  if(!resp.ok){ let msg=''; try{ msg=(await resp.json()).error; }catch(_){ } toast('Rejected: '+(msg||resp.status),'error'); return null; }
  const reader=resp.body.getReader(); const dec=new TextDecoder(); let buf='', result=null;
  for(;;){
    const {value,done}=await reader.read(); if(done) break;
    buf+=dec.decode(value,{stream:true}); let i;
    while((i=buf.indexOf('\n\n'))>=0){
      const frame=buf.slice(0,i); buf=buf.slice(i+2);
      const line=frame.split('\n').find(l=>l.startsWith('data: ')); if(!line) continue;
      let d; try{ d=JSON.parse(line.slice(6)); }catch(_){ continue; }
      if(d.event==='closed') continue;
      appendStream('#caddyLog', d);
      if(d.event==='done') result=d;
    }
  }
  return result;
}

async function refreshTracesData(){
  const t = state.node;
  const statsEl=$('#tracesStats'), tableEl=$('#tracesTable');
  if(!statsEl || !tableEl) return;
  const [stats, td] = await Promise.all([
    api('/api/traces/'+t+'/stats'),
    api('/api/traces/'+t+'?limit=20'),
  ]);

  if(stats && !stats.error && stats.total_traces_last_hour>0){
    statsEl.innerHTML =
      statCard('Traces · last hour', fmtNum(stats.total_traces_last_hour), 'accent', '') +
      statCard('Avg Duration', stats.avg_duration_ms+' ms', '', '') +
      statCard('Slowest', stats.slowest_duration_ms+' ms', 'yellow', '') +
      statCard('Error Rate', stats.error_rate_percent+'%', stats.error_count>0?'red':'green', stats.error_count+' errors');
  } else {
    statsEl.innerHTML='';
  }

  const traces = (td && td.traces) || [];
  if(!traces.length){
    tableEl.innerHTML = '<div class="muted">No traces yet. They appear once tracing is enabled and the node emits spans.</div>';
    return;
  }
  const rows = traces.map(tr=>{
    const durCls = tr.error ? 'red' : (tr.duration_ms>500 ? 'yellow' : 'green');
    const when = tr.start_time ? fmtTime(tr.start_time) : '—';
    const status = tr.error ? '<span class="badge err">error</span>' : '<span class="badge ok">ok</span>';
    return `<tr class="clickable" data-tid="${esc(tr.trace_id)}">
      <td>${esc(when)}</td>
      <td>${esc(tr.operation||'—')}</td>
      <td class="dur ${durCls}">${esc(String(tr.duration_ms))} ms</td>
      <td>${status}</td></tr>`;
  }).join('');
  tableEl.innerHTML = `<table class="tbl"><thead><tr><th>Time</th><th>Operation</th><th>Duration</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table>`;
  tableEl.querySelectorAll('tr[data-tid]').forEach(row=>row.addEventListener('click', ()=>{
    window.open('http://localhost:16686/trace/'+row.dataset.tid, '_blank', 'noopener');
  }));
}

function fmtTime(ms){
  const d = new Date(ms);
  const p = n => String(n).padStart(2,'0');
  return p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());
}

// the public path); shown only on a testnet scripts node. All enable/disable is
// CLI-only -- the card just points the operator at the right script.
async function renderAddonsCard(){
  const c = $('#addonsCard'); if(!c) return;
  if(isReadonly()){ c.style.display='none'; return; }   // external/public: not applicable
  const s = await api('/api/addons/status?node_type='+state.node);

  c.style.display='';

// ---- Firewall (status + the three node ports only) -------------------------
const FW_PORTS = [
  ['49590/udp','Validator P2P (primary)'],
  ['49594/udp','Validator P2P (worker)'],
  ['43174/tcp','Uptime Kuma health'],
];

async function loadFirewall(){
  const card=$('#fwCard'); if(!card) return;
  const f = await api('/api/firewall');
  if(f.error && !f.installed){
    card.innerHTML = `<h3>Firewall</h3><p class="muted" style="font-size:13px">Firewall status unavailable${f.error?' ('+esc(f.error)+')':''}. Manage it with <span class="mono">firewall-setup.sh</span> on the server.</p>`;
    return;
  }
  const ports = f.ports||{};
  const active = !!f.active && !isReadonly();

  // Port rows: interactive when ufw is active; dimmed + button-less when not
  // (or when the selected node is external/read-only).
  const portRows = FW_PORTS.map(([pp,label])=>{
    const open=!!ports[pp];
    if(!active){
      return `<div class="kv" style="align-items:center;opacity:.45">
        <span class="k">${esc(label)} · <span class="mono">${esc(pp)}</span></span>
        <span class="v"><span class="badge" style="background:rgba(122,154,184,0.15);color:var(--text2)">disabled</span></span>
      </div>`;
    }
    return `<div class="kv" style="align-items:center">
      <span class="k">${esc(label)} · <span class="mono">${esc(pp)}</span></span>
      <span class="v" style="display:flex;gap:10px;align-items:center;justify-content:flex-end">
        ${open?'<span class="badge ok">open</span>':'<span class="badge err">closed</span>'}
        <button class="btn ${open?'btn-red':'btn-green'}" data-fw-port="${esc(pp)}" data-fw-state="${open?'off':'on'}">${open?'Close':'Open'}</button>
      </span></div>`;
  }).join('');

  const ufwBadge = !f.installed
    ? '<span class="muted">not installed</span>'
    : (active ? '<span class="badge ok">active</span>' : '<span class="badge warn">inactive</span>');

  const inactiveInfo = (f.installed && !active)
    ? `<div class="note" style="margin-top:12px;border-color:rgba(255,217,61,0.35);background:rgba(255,217,61,0.07)">
        UFW is not active. Port management is disabled until the firewall is enabled. To enable, run
        <span class="mono">sudo firewall-setup.sh</span> on the server and select option 2. Once enabled, you can manage node ports from this panel.</div>`
    : '';

  card.innerHTML = `
    <h3>Firewall</h3>
    <div class="kv"><span class="k">ufw</span><span class="v">${ufwBadge}</span></div>
    ${inactiveInfo}
    <div class="kv"><span class="k">Default inbound</span><span class="v">${esc(f.default_incoming||'—')}</span></div>
    <div class="kv"><span class="k">SSH port</span><span class="v">${esc(f.ssh_port||'—')}</span></div>
    ${portRows}
    <div class="note" style="margin-top:14px">Only the three node ports can be toggled here.
      <strong>SSH and system access settings must be configured via <span class="mono">firewall-setup.sh</span> directly on the server to avoid lockout.</strong></div>`;
  card.querySelectorAll('[data-fw-port]').forEach(b=>b.addEventListener('click', ()=>toggleFirewallPort(b.dataset.fwPort, b.dataset.fwState, b)));
}

async function toggleFirewallPort(spec, pstate, btn){
  const [port,proto]=spec.split('/');
  if(btn){ btn.disabled=true; btn.innerHTML='<span class="spinner"></span>'; }
  const r = await api('/api/firewall/port', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({port, proto, state:pstate}),
  });
  if(r.ok) toast('Firewall '+(pstate==='on'?'opened ':'closed ')+spec,'success');
  else toast('Firewall change failed: '+(r.error||'unknown error'),'error');
  loadFirewall();
}

// ---- Danger Zone (remove the selected node) --------------------------------
// Node removal is irreversible (validator keys are unrecoverable), so it is done
// on the server via the CLI -- never from this dashboard. Show how, for all node
// types (scripts and externally-deployed docker alike).
function dangerZoneHtml(){
  return `<div class="card" id="dzCard" style="margin-top:14px">
    <h3>Remove / Delete a Node</h3>
    <p style="color:var(--text2);font-size:13px">Node removal is permanent — <strong style="color:var(--red)">validator keys cannot be recovered</strong> — so it runs on the server, not from this dashboard. SSH into the server and run the removal script. It's interactive: you choose how much to remove (service only · service + chain data · everything), it detects non-standard / custom installs, and it can also remove this dashboard.</p>
    <div class="cmd-box mono">sudo bash ~/telcoin-node-scripts/remove-node.sh</div>
  </div>`;
}
