<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telcoin Node Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080c14; --bg2:#0d1420; --bg3:#111b2e;
  --accent:#00b4ff; --accent2:#0066ff;
  --green:#00e87a; --yellow:#ffd93d; --red:#ff4d6d;
  --text:#e8f4ff; --text2:#7a9ab8; --text3:#3d5a73;
  --border:1px solid rgba(0,180,255,0.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Syne',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:14px;
  line-height:1.5;
  background-image:
    linear-gradient(rgba(0,180,255,0.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,180,255,0.035) 1px,transparent 1px);
  background-size:40px 40px;
  min-height:100vh;
}
.mono{font-family:'JetBrains Mono',monospace}
a{color:var(--accent);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
button:disabled{opacity:.5;cursor:not-allowed}

/* ---- Layout ---- */
.wrap{max-width:none;margin:0 auto;padding:0 28px}

/* ---- Header ---- */
header{
  border-bottom:var(--border);
  background:rgba(8,12,20,0.85);
  backdrop-filter:blur(8px);
  position:sticky;top:0;z-index:50;
}
.hdr{display:flex;align-items:center;gap:24px;height:62px}
.brand{display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo{
  width:38px;height:38px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.logo img{width:100%;height:100%;object-fit:contain}
/* Fallback badge shown only if telcoin-logo.png is missing (img onerror). */
.logo.placeholder{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  font-weight:800;font-size:15px;color:#001;
  box-shadow:0 0 18px rgba(0,180,255,0.45);
}
.brand h1{font-size:16px;font-weight:700;letter-spacing:.3px}
.brand .sub{font-size:10px;color:var(--text2);letter-spacing:2px;text-transform:uppercase}
nav{display:flex;gap:4px;margin:0 auto}
.tab{
  padding:8px 15px;border-radius:8px;font-weight:600;font-size:13px;
  color:var(--text2);transition:.15s;
}
.tab:hover{color:var(--text);background:var(--bg2)}
.tab.active{color:var(--accent);background:rgba(0,180,255,0.1)}
.hdr-right{display:flex;align-items:center;gap:14px;flex-shrink:0}
.net-pill{
  font-size:11px;font-weight:600;padding:5px 11px;border-radius:14px;
  border:1px solid var(--text3);color:var(--text2);white-space:nowrap;
}
.net-pill.up{color:var(--green);border-color:rgba(0,232,122,0.4)}
.net-pill.degraded{color:var(--yellow);border-color:rgba(255,217,61,0.4)}
.net-pill.down{color:var(--red);border-color:rgba(255,77,109,0.4)}
.clock{font-size:12px;color:var(--text2);letter-spacing:.5px}
.btn-refresh{
  padding:7px 13px;border-radius:8px;border:var(--border);
  font-size:12px;font-weight:600;color:var(--text);transition:.15s;
}
.btn-refresh:hover{border-color:var(--accent);color:var(--accent)}

/* ---- Node selector ---- */
.selector{display:flex;gap:14px;padding:20px 0 4px}
.node-btn{
  flex:1;display:flex;align-items:center;gap:14px;
  padding:15px 18px;border-radius:12px;
  background:var(--bg2);border:1px solid rgba(0,180,255,0.12);
  transition:.18s;text-align:left;
}
.node-btn:hover{border-color:rgba(0,180,255,0.4)}
.node-btn.active{
  border-color:var(--accent);
  box-shadow:0 0 0 1px var(--accent),0 0 24px rgba(0,180,255,0.25);
  background:var(--bg3);
}
.node-btn .nicon{font-size:24px;line-height:1}
.node-btn .nname{font-weight:700;font-size:15px;text-transform:capitalize}
.node-btn .nstat{font-size:12px;display:flex;align-items:center;gap:6px;color:var(--text2)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0}
.dot.green{background:var(--green);box-shadow:0 0 8px var(--green)}
.dot.red{background:var(--red)}
.dot.gray{background:var(--text3)}

/* ---- Views / cards ---- */
.view{padding:18px 0 60px;display:none}
.view.active{display:block}
.card{
  background:var(--bg2);border:var(--border);border-radius:12px;padding:18px;
}
.card h3{font-size:12px;text-transform:uppercase;letter-spacing:1.4px;color:var(--text2);margin-bottom:14px;font-weight:600}
.grid{display:grid;gap:14px}
.stats{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));margin-top:16px}
.two-col{grid-template-columns:1fr 1fr;margin-top:14px}
@media(max-width:720px){.two-col{grid-template-columns:1fr}}

.group-label{font-size:10px;text-transform:uppercase;letter-spacing:1.8px;color:var(--text3);font-weight:600;margin:22px 0 0}
.group-label:first-of-type{margin-top:8px}
/* Full-width single-column dashboard (.wrap supplies consistent side padding) */
.dash{max-width:none;margin:0}
/* Per-section card grids: explicit column counts so each row fills edge-to-edge
   with no empty trailing space. min-width:0 on items lets long content (e.g. the
   version string) wrap instead of blowing the grid track out. */
.dgrid{display:grid;gap:14px;margin-top:8px}
.dgrid>*{min-width:0}
.dgrid-4{grid-template-columns:repeat(4,1fr)}
.dgrid-5{grid-template-columns:repeat(5,1fr)}
.dgrid-3{grid-template-columns:repeat(3,1fr)}
.dgrid-auto{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
@media(max-width:820px){
  .dgrid-3,.dgrid-4,.dgrid-5{grid-template-columns:repeat(2,1fr)}
}
.stat .label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text2)}
.stat .val{font-size:26px;font-weight:700;margin-top:6px;font-family:'JetBrains Mono',monospace}
.stat .meta{font-size:12px;color:var(--text2);margin-top:4px}
.val.green{color:var(--green)} .val.red{color:var(--red)} .val.yellow{color:var(--yellow)} .val.accent{color:var(--accent)}

/* progress bar */
.bar{height:7px;border-radius:5px;background:var(--bg);overflow:hidden;margin-top:12px}
.bar > span{display:block;height:100%;border-radius:5px;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:width .8s ease}
.bar > span.warn{background:linear-gradient(90deg,var(--yellow),#ff9d3d)}
.bar > span.crit{background:linear-gradient(90deg,var(--red),#ff7d8d)}

/* ---- Service control row ---- */
.svc-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.pill{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 16px;border-radius:20px;font-weight:700;font-size:13px;
  background:var(--bg);border:1px solid var(--text3);
}
.pill.green{color:var(--green);border-color:rgba(0,232,122,0.4)}
.pill.red{color:var(--red);border-color:rgba(255,77,109,0.4)}
.pill.busy{color:var(--yellow);border-color:rgba(255,217,61,0.4)}
.btn{
  padding:9px 18px;border-radius:9px;font-weight:700;font-size:13px;transition:.15s;
  display:inline-flex;align-items:center;gap:8px;
}
.btn-green{background:var(--green);color:#002;}
.btn-green:hover:not(:disabled){box-shadow:0 0 18px rgba(0,232,122,0.5)}
.btn-red{border:1px solid var(--red);color:var(--red)}
.btn-red:hover:not(:disabled){background:rgba(255,77,109,0.12)}
.btn-out{border:var(--border);color:var(--text)}
.btn-out:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.uptime{font-size:12px;color:var(--text2);margin-left:auto}
.spinner{
  width:13px;height:13px;border:2px solid rgba(255,255,255,0.3);
  border-top-color:currentColor;border-radius:50%;display:inline-block;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ---- key/value rows ---- */
.kv{display:flex;justify-content:space-between;gap:14px;padding:9px 0;border-bottom:1px solid rgba(0,180,255,0.06);font-size:13px}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--text2)}
.kv .v{font-family:'JetBrains Mono',monospace;text-align:right;word-break:break-all}
.kv input{
  background:var(--bg);border:var(--border);color:var(--text);border-radius:8px;
  padding:7px 10px;font-family:'JetBrains Mono',monospace;font-size:12px;min-width:220px;
}
.kv input:focus{outline:none;border-color:var(--accent)}

/* quick actions */
.qa{display:flex;flex-direction:column;gap:10px}
.qa .btn{justify-content:center}

/* ---- Logs ---- */
.log-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.log-body{
  height:420px;overflow:auto;background:#020608;border-radius:9px;
  padding:12px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.65;
  border:1px solid rgba(0,180,255,0.08);
}
.log-line{white-space:pre-wrap;word-break:break-all;color:var(--text2)}
.log-line.err{color:var(--red)} .log-line.warn{color:var(--yellow)}
.log-line.ok{color:var(--green)} .log-line.info{color:var(--accent)}
.live-dot{width:9px;height:9px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,232,122,0.5)}50%{opacity:.5;box-shadow:0 0 0 6px rgba(0,232,122,0)}}
select{
  background:var(--bg);border:var(--border);color:var(--text);border-radius:8px;
  padding:7px 10px;font-family:inherit;font-size:12px;
}
.log-controls input{
  background:var(--bg);border:var(--border);color:var(--text);border-radius:8px;
  padding:7px 10px;font-family:'JetBrains Mono',monospace;font-size:12px;min-width:160px;
}
.log-controls input:focus{outline:none;border-color:var(--accent)}

/* ---- Traces table ---- */
.tbl{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px}
.tbl th{
  text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1px;
  color:var(--text2);font-weight:600;padding:9px 10px;border-bottom:1px solid rgba(0,180,255,0.12);
}
.tbl td{padding:9px 10px;border-bottom:1px solid rgba(0,180,255,0.06);font-family:'JetBrains Mono',monospace}
.tbl tr:last-child td{border-bottom:none}
.tbl tr.clickable{cursor:pointer;transition:.12s}
.tbl tr.clickable:hover td{background:rgba(0,180,255,0.06)}
.tbl .dur.green{color:var(--green)} .tbl .dur.yellow{color:var(--yellow)} .tbl .dur.red{color:var(--red)}
.badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:700}
.badge.ok{background:rgba(0,232,122,0.14);color:var(--green)}
.badge.err{background:rgba(255,77,109,0.14);color:var(--red)}
.toggle-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.jdot{width:9px;height:9px;border-radius:50%;background:var(--text3);display:inline-block;flex-shrink:0;vertical-align:middle;margin-right:6px}
.jdot.green{background:var(--green);box-shadow:0 0 8px var(--green)}
.jdot.gray{background:var(--text3)}

/* ---- Setup wizard ---- */
.steps{display:flex;gap:8px;margin-bottom:22px}
.step{flex:1;text-align:center}
.step .num{
  width:30px;height:30px;border-radius:50%;margin:0 auto 6px;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;
  background:var(--bg);border:1px solid var(--text3);color:var(--text2);
}
.step.active .num{border-color:var(--accent);color:var(--accent);box-shadow:0 0 14px rgba(0,180,255,0.4)}
.step.done .num{background:var(--green);border-color:var(--green);color:#002}
.step .slbl{font-size:11px;color:var(--text2)}
.step.active .slbl{color:var(--text)}
.check{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid rgba(0,180,255,0.06)}
.check .ci{width:22px;text-align:center;font-weight:700}
.check .cl{flex:1}
.check .cl .ct{font-weight:600}
.check .cl .cd{font-size:12px;color:var(--text2)}
.radio-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px}
.rcard{
  padding:15px;border-radius:11px;background:var(--bg);border:1px solid var(--text3);
  transition:.15s;cursor:pointer;
}
.rcard:hover:not(.disabled){border-color:rgba(0,180,255,0.5)}
.rcard.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.rcard.disabled{opacity:.45;cursor:not-allowed}
.rcard .rt{font-weight:700;display:flex;align-items:center;gap:8px}
.rcard .rd{font-size:12px;color:var(--text2);margin-top:5px}
.tag{font-size:9px;padding:2px 7px;border-radius:10px;background:var(--bg3);color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.field{margin-top:14px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px}
.field input{
  width:100%;background:var(--bg);border:var(--border);color:var(--text);
  border-radius:9px;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:13px;
}
.field input:focus{outline:none;border-color:var(--accent)}
.wiz-nav{display:flex;justify-content:space-between;margin-top:22px;gap:10px}
.note{
  background:rgba(0,180,255,0.07);border:1px solid rgba(0,180,255,0.2);
  border-radius:9px;padding:11px 13px;font-size:12px;color:var(--text2);margin-bottom:16px;
}
.cmd-box{
  background:#020608;border:1px solid rgba(0,180,255,0.15);border-radius:9px;
  padding:13px 15px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--green);
  margin-top:10px;word-break:break-all;
}

/* ---- empty state ---- */
.empty{text-align:center;padding:70px 20px}
.empty .ei{font-size:48px;margin-bottom:14px}
.empty h2{font-size:20px;margin-bottom:8px}
.empty p{color:var(--text2);margin-bottom:20px;max-width:380px;margin-left:auto;margin-right:auto}

/* ---- toasts ---- */
.toasts{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:10px;z-index:200}
.toast{
  min-width:240px;max-width:340px;padding:13px 16px;border-radius:10px;
  background:var(--bg3);border-left:3px solid var(--accent);
  box-shadow:0 8px 30px rgba(0,0,0,0.5);font-size:13px;font-weight:600;
  animation:slidein .3s ease;
}
.toast.success{border-left-color:var(--green)}
.toast.error{border-left-color:var(--red)}
.toast.info{border-left-color:var(--accent)}
.toast.out{animation:fadeout .3s ease forwards}
@keyframes slidein{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeout{to{transform:translateX(120%);opacity:0}}
.muted{color:var(--text3)}
</style>
</head>
<body>

<header>
  <div class="wrap hdr">
    <div class="brand">
      <div class="logo" id="brandLogo"><img src="/static/telcoin-logo.png" alt="Telcoin"
        onerror="this.parentElement.classList.add('placeholder');this.parentElement.textContent='TN'"></div>
      <div>
        <h1>Telcoin Node Manager</h1>
        <div class="sub">Network Operations</div>
      </div>
    </div>
    <nav id="nav">
      <button class="tab active" data-view="dashboard">Dashboard</button>
      <button class="tab" data-view="logs">Logs</button>
      <button class="tab" data-view="config">Config</button>
      <button class="tab" data-view="update">Update</button>
      <button class="tab" data-view="traces">Traces</button>
      <button class="tab" data-view="settings">Settings</button>
      <button class="tab" data-view="setup">Setup</button>
      <button class="tab" data-view="system">System</button>
    </nav>
    <div class="hdr-right">
      <span class="net-pill" id="navNetPill" title="Adiri Testnet network status">⚪ Network: …</span>
      <span class="clock mono" id="clock">--:--:-- UTC</span>
      <button class="btn-refresh" id="refreshBtn">↻ Refresh</button>
    </div>
  </div>
</header>

<div class="wrap">
  <!-- node selector -->
  <div class="selector" id="selector">
    <button class="node-btn active" data-node="observer">
      <span class="nicon">📡</span>
      <div>
        <div class="nname">Observer</div>
        <div class="nstat"><span class="dot gray" id="dot-observer"></span><span id="stat-observer">checking…</span></div>
      </div>
    </button>
    <button class="node-btn" data-node="validator">
      <span class="nicon">🛡️</span>
      <div>
        <div class="nname">Validator</div>
        <div class="nstat"><span class="dot gray" id="dot-validator"></span><span id="stat-validator">checking…</span></div>
      </div>
    </button>
  </div>

  <!-- DASHBOARD -->
  <section class="view active" id="view-dashboard"></section>
  <!-- LOGS -->
  <section class="view" id="view-logs"></section>
  <!-- CONFIG -->
  <section class="view" id="view-config"></section>
  <!-- UPDATE -->
  <section class="view" id="view-update"></section>
  <!-- TRACES -->
  <section class="view" id="view-traces"></section>
  <!-- SETTINGS -->
  <section class="view" id="view-settings"></section>
  <!-- SETUP -->
  <section class="view" id="view-setup"></section>
  <!-- SYSTEM -->
  <section class="view" id="view-system"></section>
</div>

<div class="toasts" id="toasts"></div>

<script>
// =============================================================================
// State + helpers
// =============================================================================
const state = {
  node: 'observer',
  view: 'dashboard',
  nodes: { observer:{installed:false,status:'not installed'}, validator:{installed:false,status:'not installed'} },
  refreshTimer: null,
  tracesTimer: null,   // 30s traces auto-refresh
  es: null,        // log SSE
  updateES: null,  // update progress SSE
  configES: null,  // config-save progress SSE
  configEditing: false,
  removeES: null,  // node-removal progress SSE
  live: false,
  logBuffer: [],                          // client-side line buffer (static + live)
  logFilter: { level:'all', search:'' },  // level (all/error/warn/info) + text search
  setupStep: 1,
  setup: { network:'adiri', method:'source', passphrase:'loadcredential',
           eth:'', bls:'', buildRef:'', dockerImage:'', publicIp:'', instance:'' },
  preflight: null,
};

const $ = (s,r=document)=>r.querySelector(s);
const el = (tag,cls,html)=>{const e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;};
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

async function api(path, opts){
  try{
    const r = await fetch(path, opts);
    return await r.json();
  }catch(e){ return {error:String(e)}; }
}

// =============================================================================
// Toasts
// =============================================================================
function toast(msg, type='info'){
  const t = el('div','toast '+type, esc(msg));
  $('#toasts').appendChild(t);
  setTimeout(()=>{ t.classList.add('out'); setTimeout(()=>t.remove(),300); }, 3000);
}

// =============================================================================
// Clock
// =============================================================================
function tickClock(){
  const d = new Date();
  const p = n => String(n).padStart(2,'0');
  $('#clock').textContent = `${p(d.getUTCHours())}:${p(d.getUTCMinutes())}:${p(d.getUTCSeconds())} UTC`;
}
setInterval(tickClock,1000); tickClock();

// =============================================================================
// Navigation
// =============================================================================
$('#nav').addEventListener('click', e=>{
  const tab = e.target.closest('.tab'); if(!tab) return;
  switchView(tab.dataset.view);
});
function switchView(v){
  state.view = v;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.view===v));
  document.querySelectorAll('.view').forEach(s=>s.classList.toggle('active', s.id==='view-'+v));
  stopAutoRefresh();
  stopLive();
  stopTracesRefresh();
  stopUpdateStream();
  stopConfigStream();
  stopRemoveStream();
  if(v!=='config') state.configEditing=false;
  if(v==='dashboard'){ renderDashboard(); startAutoRefresh(); }
  if(v==='logs')   renderLogs();
  if(v==='config') renderConfig();
  if(v==='update') renderUpdate();
  if(v==='traces'){ renderTraces(); startTracesRefresh(); }
  if(v==='settings') renderSettings();
  if(v==='setup')  renderSetup();
  if(v==='system') renderSystem();
}

$('#selector').addEventListener('click', e=>{
  const b = e.target.closest('.node-btn'); if(!b) return;
  state.node = b.dataset.node;
  document.querySelectorAll('.node-btn').forEach(n=>n.classList.toggle('active', n.dataset.node===state.node));
  rerenderActive();
});

$('#refreshBtn').addEventListener('click', ()=>{ loadNodes(); rerenderActive(); });

function rerenderActive(){
  if(state.view==='dashboard') renderDashboard();
  if(state.view==='logs')   renderLogs();
  if(state.view==='config') renderConfig();
  if(state.view==='update') renderUpdate();
  if(state.view==='traces') renderTraces();
  if(state.view==='settings') renderSettings();
  if(state.view==='system') renderSystem();
  if(state.view==='setup')  renderSetup();
}

// =============================================================================
// Node selector status
// =============================================================================
async function loadNodes(){
  const d = await api('/api/nodes');
  if(d && !d.error) state.nodes = d;
  for(const t of ['observer','validator']){
    const n = state.nodes[t] || {installed:false,status:'not installed'};
    const dot = $('#dot-'+t), st = $('#stat-'+t);
    st.textContent = n.installed ? n.status : 'not installed';
    dot.className = 'dot ' + (n.status==='active'?'green':(n.installed?'red':'gray'));
  }
}

function statCard(label, val, valCls, meta, bar){
  let barHtml='';
  if(bar){
    const cls = bar.pct>=90?'crit':(bar.pct>=75?'warn':'');
    barHtml = `<div class="bar"><span class="${cls}" style="width:${Math.max(0,Math.min(100,bar.pct))}%"></span></div>`;
  }
  return `<div class="card stat">
    <div class="label">${esc(label)}</div>
    <div class="val ${valCls||''}">${val}</div>
    ${meta?`<div class="meta">${meta}</div>`:''}
    ${barHtml}
  </div>`;
}

async function serviceAction(action){
  const pill = $('#svcPill');
  const verbing = {start:'starting…',stop:'stopping…',restart:'restarting…'}[action];
  document.querySelectorAll('#view-dashboard [data-act]').forEach(b=>{
    b.disabled=true;
    if(b.dataset.act===action) b.innerHTML='<span class="spinner"></span> '+cap(verbing);
  });
  if(pill){ pill.className='pill busy'; pill.textContent='● '+verbing; }

  const r = await api('/api/service/'+state.node+'/'+action, {method:'POST'});
  if(r.ok){
    toast(`${cap(state.node)} ${action} succeeded`, 'success');
  }else{
    toast(`${cap(state.node)} ${action} failed: ${r.error||'unknown error'}`, 'error');
  }
  await loadNodes();
  setTimeout(()=>{ if(state.view==='dashboard') renderDashboard(); }, 1500);
}

function renderLogs(){

  state.logFilter = { level:'all', search:'' };
  c.innerHTML = `
    <div class="card">

      <div class="log-controls">
        <button class="btn btn-out" id="liveBtn">● Live</button>
        <button class="btn btn-out" id="logRefresh">↻ Refresh</button>
        <select id="logLines">
          <option value="50">50 lines</option>
          <option value="100" selected>100 lines</option>
          <option value="200">200 lines</option>
          <option value="500">500 lines</option>
          <option value="1000">1000 lines</option>
        </select>
        <select id="logLevel">
          <option value="all">All levels</option>
          <option value="error">Error</option>
          <option value="warn">Warn</option>
          <option value="info">Info</option>
        </select>
        <input id="logSearch" placeholder="search text…" autocomplete="off">
        <button class="btn btn-out" id="logCopy">⧉ Copy</button>
        <button class="btn btn-out" id="logDownload">⤓ Download</button>
        <span id="liveStatus" style="margin-left:auto;font-size:12px;color:var(--text2)"></span>
      </div>
      <div class="log-body" id="logBody"><div class="muted">Loading…</div></div>
    </div>`;
  $('#logRefresh').addEventListener('click', loadLogLines);
  $('#logLines').addEventListener('change', loadLogLines);
  $('#liveBtn').addEventListener('click', toggleLive);
  $('#logLevel').addEventListener('change', e=>{ state.logFilter.level=e.target.value; renderLogBuffer(); });
  $('#logSearch').addEventListener('input', e=>{ state.logFilter.search=e.target.value; renderLogBuffer(); });
  $('#logCopy').addEventListener('click', copyLogs);
  $('#logDownload').addEventListener('click', downloadLogs);
  loadLogLines();
}

function colorize(line){
  const l = line.toLowerCase();
  let cls='';
  if(/error/i.test(line)) cls='err';
  else if(/warn/i.test(line)) cls='warn';
  else if(/\[ok\]|success/i.test(line)) cls='ok';
  else if(/info/i.test(line)) cls='info';
  return `<div class="log-line ${cls}">${esc(line)}</div>`;
}

// Coarse level for the filter dropdown -- mirrors colorize()'s precedence
// (error > warn > everything-else) so the filter and the colours agree.
function lineLevel(line){
  if(/error/i.test(line)) return 'error';
  if(/warn/i.test(line)) return 'warn';
  return 'info';
}

function logMatches(line){
  const f = state.logFilter;
  if(f.level!=='all' && lineLevel(line)!==f.level) return false;
  if(f.search && !line.toLowerCase().includes(f.search.toLowerCase())) return false;
  return true;
}

function visibleLogLines(){ return state.logBuffer.filter(logMatches); }

// Render the buffer through the active filter. Used by the static fetch and on
// every filter change; live streaming appends incrementally (see startLive).
function renderLogBuffer(){
  const body = $('#logBody'); if(!body) return;
  const lines = visibleLogLines();
  if(!lines.length){
    body.innerHTML = state.logBuffer.length ? '<div class="muted">No lines match the filter.</div>'
                                            : '<div class="muted">No log output.</div>';
    return;
  }
  body.innerHTML = lines.map(colorize).join('');
  body.scrollTop = body.scrollHeight;
}

async function loadLogLines(){
  const body = $('#logBody'); if(!body) return;
  const n = $('#logLines').value;
  const d = await api(`/api/logs/${state.node}?lines=${n}`);
  state.logBuffer = (d && d.lines) || [];
  renderLogBuffer();
}

function copyLogs(){
  const txt = visibleLogLines().join('\n');
  if(!txt){ toast('No lines to copy','error'); return; }
  navigator.clipboard?.writeText(txt).then(
    ()=>toast('Logs copied to clipboard','success'),
    ()=>toast('Copy failed','error'));
}

function downloadLogs(){
  const txt = visibleLogLines().join('\n');
  if(!txt){ toast('No lines to download','error'); return; }
  const stamp = new Date().toISOString().replace(/:/g,'-').replace(/\.\d+Z$/,'Z');
  const blob = new Blob([txt+'\n'], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `telcoin-${state.node}-${stamp}.log`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(a.href);
}

function toggleLive(){ state.live ? stopLive() : startLive(); }

function startLive(){
  const body = $('#logBody'); if(!body) return;
  state.live = true;
  $('#liveBtn').innerHTML = '<span class="live-dot"></span> Stop';
  $('#liveStatus').innerHTML = '<span class="live-dot"></span> LIVE';
  state.logBuffer = [];
  body.innerHTML='';
  state.es = new EventSource(`/api/logs/${state.node}/stream`);
  state.es.onmessage = ev=>{
    // Keep every line in the buffer (so filtering never loses lines), but only
    // paint the ones that pass the active filter.
    state.logBuffer.push(ev.data);
    while(state.logBuffer.length>2000) state.logBuffer.shift();
    if(logMatches(ev.data)){
      body.insertAdjacentHTML('beforeend', colorize(ev.data));
      while(body.children.length>1000) body.removeChild(body.firstChild);
      body.scrollTop = body.scrollHeight;
    }
  };
  state.es.onerror = ()=>{ /* keep open; browser auto-reconnects */ };
}

function stopLive(){
  if(state.es){ state.es.close(); state.es=null; }
  if(state.live){
    state.live=false;
    const b=$('#liveBtn'), st=$('#liveStatus');
    if(b) b.innerHTML='● Live';
    if(st) st.textContent='';
  }
}

// Editable field allowlist (mirrors edit-config.sh --json + server.py). Each
// row carries a value validator so we reject bad input before streaming.
function configValueOk(field, value){
  if(field==='primary_listener'||field==='worker_listener') return /^\/(ip4|ip6)\/[^/]+\/udp\/[0-9]+\/quic-v1$/.test(value);
  if(field==='instance') return /^[1-9]$/.test(value);
  if(field==='metrics') return /^(\d{1,3}\.){3}\d{1,3}:\d{1,5}$/.test(value);
  if(field==='verbosity') return /^-v{1,5}$/.test(value);
  if(field==='docker_image') return /^[A-Za-z0-9._/:@-]+$/.test(value) && value.includes(':');
  return false;
}

// One editable row: label + input/select + per-field Save (each save is one
// daemon-reload + restart + health verify, exactly like the CLI menu).
function cfgEditRow(field, label, current, kind){
  let control;
  if(kind==='verbosity'){
    const opts=[['','— choose level —'],['-v','ERROR (-v)'],['-vv','WARN (-vv)'],['-vvv','INFO (-vvv)'],['-vvvv','DEBUG (-vvvv)'],['-vvvvv','TRACE (-vvvvv)']];
    control=`<select id="cfg_${field}">${opts.map(([v,l])=>`<option value="${esc(v)}">${esc(l)}</option>`).join('')}</select>`;
  } else if(kind==='instance'){
    control=`<select id="cfg_${field}">${['1','2','3','4','5','6','7','8','9'].map(v=>`<option value="${v}" ${v===String(current)?'selected':''}>${v}</option>`).join('')}</select>`;
  } else {
    control=`<input id="cfg_${field}" value="${esc(current||'')}" autocomplete="off">`;
  }
  return `<div class="kv" style="align-items:center">
    <span class="k">${esc(label)}</span>
    <span class="v" style="display:flex;gap:8px;align-items:center;justify-content:flex-end;flex-wrap:wrap">
      ${control}
      <button class="btn btn-green" data-cfg-save="${field}">Save</button>
    </span></div>`;
}

async function renderConfig(){
  const c = $('#view-config');
  const t = state.node;
  if(!state.nodes[t]?.installed){ emptyState(c, cap(t)); return; }
  const d = await api('/api/config/'+t);
  if(d.error || d.installed===false){ emptyState(c, cap(t)); return; }
  state.config = d;
  const editing = !!state.configEditing;

  // Editable fields (the exact set edit-config.sh's menu edits). docker_image
  // only for docker installs.
  const editable = [
    ['instance','Instance', d.instance, 'instance'],
    ['metrics','Metrics Address', d.metrics, 'text'],
    ['primary_listener','Primary Listener (bind)', d.primary_listener, 'text'],
    ['worker_listener','Worker Listener (bind)', d.worker_listener, 'text'],
    ['verbosity','Log Verbosity', '', 'verbosity'],
  ];
  if(d.install_method==='docker') editable.push(['docker_image','Docker Image', d.docker_image, 'text']);

  // Read-only context rows.
  const roRows = [
    ['RPC Port', d.rpc_port],
    ['External Primary', d.external_primary],
    ['External Worker', d.external_worker],
    ['Version', d.version],
    ['Install Method', d.install_method],
    ['Passphrase Method', d.passphrase_method],
  ];

  const editableHtml = editing
    ? editable.map(([f,l,cur,kind])=>cfgEditRow(f,l,cur,kind)).join('')
    : editable.map(([f,l,cur])=>`<div class="kv"><span class="k">${esc(l)}</span><span class="v">${esc((f==='verbosity'?'':cur)||'—')}</span></div>`).join('');

  const note = editing
    ? `<div class="note" style="border-color:rgba(255,217,61,0.35);background:rgba(255,217,61,0.07)">
        Each <strong>Save</strong> runs <span class="mono">edit-config.sh --json</span>, then reloads systemd, restarts
        <span class="mono">telcoin-${esc(t)}</span> and verifies it comes back healthy${t==='validator'?' — <strong style="color:var(--yellow)">a validator restart drops consensus rounds during the brief downtime</strong>':''}. A timestamped unit backup is taken first and restored automatically if the restart fails.</div>`
    : `<div class="note">Edit configuration here, or run <span class="mono">edit-config.sh</span> on the server over SSH. Editable fields take effect after a node restart.</div>`;

  c.innerHTML = `
    ${note}
    <div class="card">
      <div class="svc-row" style="margin-bottom:6px">
        <h3 style="margin:0">${esc(cap(t))} Configuration</h3>
        <span style="margin-left:auto"></span>
        ${editing
          ? `<button class="btn btn-out" id="cfgDone">Done</button>`
          : `<button class="btn btn-out" id="cfgEdit">⚙ Edit Configuration</button>`}
      </div>
      ${editableHtml}
      ${roRows.map(([k,v])=>`<div class="kv"><span class="k">${esc(k)}</span><span class="v">${esc(v||'—')}</span></div>`).join('')}
    </div>
    <div class="card" id="cfgProgressCard" style="display:none;margin-top:14px">
      <h3>Progress</h3>
      <div class="log-body" id="cfgLog" style="height:240px"></div>
    </div>`;

  const eb=$('#cfgEdit'); if(eb) eb.addEventListener('click', ()=>{ state.configEditing=true; renderConfig(); });
  const db=$('#cfgDone'); if(db) db.addEventListener('click', ()=>{ stopConfigStream(); state.configEditing=false; renderConfig(); });
  c.querySelectorAll('[data-cfg-save]').forEach(b=>b.addEventListener('click', ()=>{
    const field=b.dataset.cfgSave;
    const value=($('#cfg_'+field)?.value||'').trim();
    saveConfigField(field, value, b);
  }));
}

function saveConfigField(field, value, btn){
  if(!configValueOk(field, value)){ toast('Invalid value for '+field, 'error'); return; }
  if(state.node==='validator' &&
     !confirm('Saving restarts the validator now — expect missed consensus rounds during the brief downtime. Continue?')) return;
  stopConfigStream();
  const card=$('#cfgProgressCard'); if(card) card.style.display='block';
  const log=$('#cfgLog'); if(log) log.innerHTML='<div class="log-line info">» saving '+esc(field)+'…</div>';
  if(btn) btn.disabled=true;
  const url='/api/config/'+state.node+'/set?field='+encodeURIComponent(field)+'&value='+encodeURIComponent(value);
  state.configES = new EventSource(url);
  state.configES.onmessage = ev=>{
    let d; try{ d=JSON.parse(ev.data); }catch(e){ return; }
    if(d.event==='closed'){ stopConfigStream(); loadNodes(); renderConfig(); return; }
    appendStream('#cfgLog', d);
    if(d.event==='done'){
      if(d.ok) toast('Saved '+field+' — node restarted','success');
      else toast('Save failed'+(d.rolled_back?' — rolled back':''),'error');
    }
  };
  state.configES.onerror = ()=>{ /* server closes the stream when the script exits */ };
}

function stopConfigStream(){ if(state.configES){ state.configES.close(); state.configES=null; } }

async function fillUpdateStatus(){
  const t = state.node;
  const box = $('#updStatus'); if(!box) return;
  const u = await api('/api/update/status/'+t);
  if(!u || u.error){
    box.innerHTML = `<div class="card"><h3>Update · ${esc(cap(t))}</h3>
      <p style="color:var(--text2);font-size:13px">Update checks aren't available on this host${u&&u.error?' ('+esc(u.error)+')':''}.
      The privileged update helper must be installed (re-run <span class="mono">install-ui.sh</span>).</p></div>`;
    return;
  }
  const method = u.install_method || 'unknown';
  const canUpdate = (method==='source' || method==='docker');
  const pending = u.pending;
  const rows = [
    ['Install method', method],
    ['Current version', u.current_ref || '—'],
    ['Latest available', (u.latest_ref || '—') + (u.update_available ? '  ⬆ newer' : '')],
    ['Pending', pending ? String(pending) : 'none'],
  ];

  let actions = '';
  if(!canUpdate){
    actions = `<p style="color:var(--text2);font-size:13px;margin-top:12px">Install method
      <strong>${esc(method)}</strong> can't be updated from here — only source builds and Docker installs are supported.</p>`;
  } else {
    actions = `
      <div class="field"><label>Target ref / tag</label>
        <input id="updRef" value="${esc(u.latest_ref || u.current_ref || '')}"
          placeholder="${method==='docker'?'image tag, e.g. v0.9.1-adiri':'tag / branch / commit'}"></div>
      <div class="svc-row" style="margin-top:14px">
        <button class="btn btn-green" id="updPrepare">⬇ Prepare</button>
        ${pending?'<button class="btn btn-out" id="updApply">▶ Apply pending</button>':''}
        ${pending?'<button class="btn btn-red" id="updDiscard">Discard pending</button>':''}
        <button class="btn btn-out" id="updRecheck">↻ Re-check</button>
      </div>
      ${t==='validator'?'<p style="color:var(--yellow);font-size:12px;margin-top:12px">⚠ Applying on a validator restarts the node — expect missed consensus rounds during the downtime.</p>':''}`;
  }

  box.innerHTML = `<div class="card"><h3>Update · ${esc(cap(t))}</h3>
    ${rows.map(([k,v])=>`<div class="kv"><span class="k">${esc(k)}</span><span class="v">${esc(v)}</span></div>`).join('')}
    ${actions}</div>`;

  const p=$('#updPrepare'); if(p) p.addEventListener('click', ()=>{
    const ref = ($('#updRef').value||'').trim();
    if(!ref){ toast('Enter a target ref','error'); return; }
    if(!/^[A-Za-z0-9._/-]+$/.test(ref)){ toast('Invalid ref','error'); return; }
    startUpdateStream('prepare', ref);
  });
  const a=$('#updApply'); if(a) a.addEventListener('click', ()=>{
    if(t==='validator' && !confirm('Apply the pending update and restart the validator now? This causes brief downtime.')) return;
    startUpdateStream('apply');
  });
  const d=$('#updDiscard'); if(d) d.addEventListener('click', discardUpdate);
  const r=$('#updRecheck'); if(r) r.addEventListener('click', fillUpdateStatus);
}

// Shared SSE-line formatter for the Update + Config progress panes. Returns the
// HTML for one {event:step|error|done} line, or null for anything else.
function streamLineHtml(d){
  let cls='info', text='';
  if(d.event==='error'){ cls='err'; text='✗ '+(d.msg||''); }
  else if(d.event==='step'){ cls='info'; text='» '+(d.msg||''); }
  else if(d.event==='done'){
    const detail = d.new_version || d.new_image || d.new_ref || d.value || '';
    cls = d.ok ? 'ok' : 'err';
    text = (d.ok?'✓ ':'✗ ') + (d.msg || ((d.phase||d.field||'done')+(detail?': '+detail:'')));
  } else return null;
  return `<div class="log-line ${cls}">${esc(text)}</div>`;
}

function appendStream(sel, d){
  const log=$(sel); if(!log) return;
  const h=streamLineHtml(d); if(!h) return;
  log.insertAdjacentHTML('beforeend', h);
  log.scrollTop = log.scrollHeight;
}

function appendUpdateLine(d){ appendStream('#updLog', d); }

function startUpdateStream(kind, ref){
  stopUpdateStream();
  const card=$('#updProgressCard'); if(card) card.style.display='block';
  const log=$('#updLog'); if(log) log.innerHTML='<div class="log-line info">» starting '+esc(kind)+'…</div>';
  let url = '/api/update/'+kind+'/'+state.node;
  if(kind==='prepare') url += '?ref='+encodeURIComponent(ref);
  // EventSource is GET-only, so prepare/apply are exposed as GET SSE endpoints.
  state.updateES = new EventSource(url);
  state.updateES.onmessage = ev=>{
    let d; try{ d=JSON.parse(ev.data); }catch(e){ return; }
    if(d.event==='closed'){ stopUpdateStream(); fillUpdateStatus(); loadNodes(); return; }
    appendUpdateLine(d);
    if(d.event==='done'){
      if(d.ok) toast('Update '+kind+' succeeded','success');
      else toast('Update '+kind+(d.rolled_back?' failed — rolled back':' did not complete'),'error');
    }
  };
  state.updateES.onerror = ()=>{ /* server closes the stream when the script exits */ };
}

function stopUpdateStream(){ if(state.updateES){ state.updateES.close(); state.updateES=null; } }

async function discardUpdate(){
  const r = await api('/api/update/discard/'+state.node, {method:'POST'});
  if(r.ok) toast('Pending update discarded','success');
  else toast('Discard failed: '+(r.error||'unknown error'),'error');
  fillUpdateStatus();
}

async function jaegerControl(action, btn){
  if(btn){ btn.disabled=true; btn.innerHTML='<span class="spinner"></span> '+(action==='start'?'Starting…':'Stopping…'); }
  const r = await api('/api/jaeger/'+action, {method:'POST'});
  if(r.ok) toast('Jaeger '+(action==='start'?'started':'stopped'),'success');
  else toast('Jaeger '+action+' failed: '+(r.error||'unknown error'),'error');
  rerenderActive();
}

async function setTracing(type, enable, btn){
  if(btn){ btn.disabled=true; btn.innerHTML='<span class="spinner"></span> '+(enable?'Enabling…':'Disabling…'); }
  const r = await api('/api/tracing/'+(enable?'enable':'disable')+'/'+type, {method:'POST'});
  if(r.ok) toast('Tracing '+(enable?'enabled':'disabled')+' for '+cap(type)+' — node restarted','success');
  else toast('Tracing change failed: '+(r.error||'unknown error'),'error');
  await loadNodes();
  rerenderActive();
}

  c.innerHTML = `

      <div id="tracesTable"><div class="muted">Loading traces…</div></div>
    </div>`;

  const s2=$('#jStop2'); if(s2) s2.addEventListener('click', ()=>jaegerControl('stop', s2));

async function refreshTracesData(){
  const t = state.node;
  const statsEl=$('#tracesStats'), tableEl=$('#tracesTable');
  if(!statsEl || !tableEl) return;
  const [stats, td] = await Promise.all([
    api('/api/traces/'+t+'/stats'),
    api('/api/traces/'+t+'?limit=20'),
  ]);

  if(stats && !stats.error && stats.total_traces_last_hour>0){
    statsEl.innerHTML =
      statCard('Traces · last hour', fmtNum(stats.total_traces_last_hour), 'accent', '') +
      statCard('Avg Duration', stats.avg_duration_ms+' ms', '', '') +
      statCard('Slowest', stats.slowest_duration_ms+' ms', 'yellow', '') +
      statCard('Error Rate', stats.error_rate_percent+'%', stats.error_count>0?'red':'green', stats.error_count+' errors');
  } else {
    statsEl.innerHTML='';
  }

  const traces = (td && td.traces) || [];
  if(!traces.length){
    tableEl.innerHTML = '<div class="muted">No traces yet. They appear once tracing is enabled and the node emits spans.</div>';
    return;
  }
  const rows = traces.map(tr=>{
    const durCls = tr.error ? 'red' : (tr.duration_ms>500 ? 'yellow' : 'green');
    const when = tr.start_time ? fmtTime(tr.start_time) : '—';
    const status = tr.error ? '<span class="badge err">error</span>' : '<span class="badge ok">ok</span>';
    return `<tr class="clickable" data-tid="${esc(tr.trace_id)}">
      <td>${esc(when)}</td>
      <td>${esc(tr.operation||'—')}</td>
      <td class="dur ${durCls}">${esc(String(tr.duration_ms))} ms</td>
      <td>${status}</td></tr>`;
  }).join('');
  tableEl.innerHTML = `<table class="tbl"><thead><tr><th>Time</th><th>Operation</th><th>Duration</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table>`;
  tableEl.querySelectorAll('tr[data-tid]').forEach(row=>row.addEventListener('click', ()=>{
    window.open('http://localhost:16686/trace/'+row.dataset.tid, '_blank', 'noopener');
  }));
}

function fmtTime(ms){
  const d = new Date(ms);
  const p = n => String(n).padStart(2,'0');
  return p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());
}

// ---- Firewall (status + the three node ports only) -------------------------
const FW_PORTS = [
  ['49590/udp','Validator P2P (primary)'],
  ['49594/udp','Validator P2P (worker)'],
  ['43174/tcp','Uptime Kuma health'],
];

async function loadFirewall(){
  const card=$('#fwCard'); if(!card) return;
  const f = await api('/api/firewall');
  if(f.error && !f.installed){
    card.innerHTML = `<h3>Firewall</h3><p class="muted" style="font-size:13px">Firewall status unavailable${f.error?' ('+esc(f.error)+')':''}. Manage it with <span class="mono">firewall-setup.sh</span> on the server.</p>`;
    return;
  }
  const ports = f.ports||{};
  const portRows = FW_PORTS.map(([pp,label])=>{
    const open=!!ports[pp];
    return `<div class="kv" style="align-items:center">
      <span class="k">${esc(label)} · <span class="mono">${esc(pp)}</span></span>
      <span class="v" style="display:flex;gap:10px;align-items:center;justify-content:flex-end">
        ${open?'<span class="badge ok">open</span>':'<span class="badge err">closed</span>'}
        <button class="btn ${open?'btn-red':'btn-green'}" data-fw-port="${esc(pp)}" data-fw-state="${open?'off':'on'}" ${f.active?'':'disabled'}>${open?'Close':'Open'}</button>
      </span></div>`;
  }).join('');
  card.innerHTML = `
    <h3>Firewall</h3>
    <div class="kv"><span class="k">ufw</span><span class="v">${f.installed?(f.active?'<span class="badge ok">active</span>':'<span class="badge err">inactive</span>'):'<span class="muted">not installed</span>'}</span></div>
    <div class="kv"><span class="k">Default inbound</span><span class="v">${esc(f.default_incoming||'—')}</span></div>
    <div class="kv"><span class="k">SSH port</span><span class="v">${esc(f.ssh_port||'—')}</span></div>
    ${portRows}
    <div class="note" style="margin-top:14px">Only the three node ports can be toggled here.
      <strong>SSH and system access settings must be configured via <span class="mono">firewall-setup.sh</span> directly on the server to avoid lockout.</strong>${f.installed&&!f.active?' Enable ufw on the server first to manage ports.':''}</div>`;
  card.querySelectorAll('[data-fw-port]').forEach(b=>b.addEventListener('click', ()=>toggleFirewallPort(b.dataset.fwPort, b.dataset.fwState, b)));
}

async function toggleFirewallPort(spec, pstate, btn){
  const [port,proto]=spec.split('/');
  if(btn){ btn.disabled=true; btn.innerHTML='<span class="spinner"></span>'; }
  const r = await api('/api/firewall/port', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({port, proto, state:pstate}),
  });
  if(r.ok) toast('Firewall '+(pstate==='on'?'opened ':'closed ')+spec,'success');
  else toast('Firewall change failed: '+(r.error||'unknown error'),'error');
  loadFirewall();
}

// ---- Danger Zone (remove the selected node) --------------------------------
function dangerZoneHtml(){
  const t = state.node;
  if(!state.nodes[t]?.installed){
    return `<div class="card" id="dzCard" style="margin-top:14px">
      <h3>Danger Zone</h3>
      <p class="muted" style="font-size:13px">No <span class="mono">telcoin-${esc(t)}</span> node is installed, so there is nothing to remove. Select an installed node above to manage its removal.</p></div>`;
  }
  return `<div class="card" id="dzCard" style="margin-top:14px;border-color:rgba(255,77,109,0.35)">
    <h3 style="color:var(--red)">Danger Zone · Remove ${esc(cap(t))}</h3>
    <p style="color:var(--text2);font-size:13px;margin-bottom:12px">Permanently removes the <span class="mono">telcoin-${esc(t)}</span> node. Choose how much to remove.
      <strong style="color:var(--red)">Keys, once removed, are unrecoverable.</strong></p>
    <div class="field"><label>Scope</label>
      <select id="rmScope">
        <option value="service">Service only — stop, disable &amp; remove the unit (keep data + keys)</option>
        <option value="data">Service + chain data — also wipe the database (keep keys)</option>
        <option value="keys">Everything — service, data, keys &amp; config (UNRECOVERABLE)</option>
      </select></div>
    <div class="field"><label>Type <span class="mono">DELETE</span> to confirm</label>
      <input id="rmConfirm" placeholder="DELETE" autocomplete="off"></div>
    <div class="svc-row" style="margin-top:6px">
      <button class="btn btn-red" id="rmBtn" disabled>Remove ${esc(cap(t))} Node</button>
    </div>
  </div>`;
}

function wireDangerZone(){
  const inp=$('#rmConfirm'), btn=$('#rmBtn');
  if(!inp || !btn) return;
  inp.addEventListener('input', ()=>{ btn.disabled = inp.value!=='DELETE'; });
  btn.addEventListener('click', removeNode);
}

function removeNode(){
  const scope=($('#rmScope')?.value)||'service';
  if(($('#rmConfirm')?.value)!=='DELETE') return;
  const t=state.node;
  if(!window.confirm('Remove the '+t+' node (scope: '+scope+')? This cannot be undone.')) return;
  stopRemoveStream();
  const card=$('#rmProgressCard'); if(card) card.style.display='block';
  const log=$('#rmLog'); if(log) log.innerHTML='<div class="log-line info">» removing '+esc(t)+' ('+esc(scope)+')…</div>';
  const btn=$('#rmBtn'); if(btn) btn.disabled=true;
  const url='/api/node/remove/'+t+'?scope='+encodeURIComponent(scope)+'&confirm=DELETE';
  state.removeES = new EventSource(url);
  state.removeES.onmessage = ev=>{
    let d; try{ d=JSON.parse(ev.data); }catch(e){ return; }
    if(d.event==='closed'){ stopRemoveStream(); loadNodes(); renderSystem(); return; }
    appendStream('#rmLog', d);
    if(d.event==='done'){
      if(d.ok) toast(cap(t)+' node removed','success');
      else toast('Removal failed: '+(d.msg||'unknown error'),'error');
    }
  };
  state.removeES.onerror = ()=>{ /* server closes the stream when the script exits */ };
}

function stopRemoveStream(){ if(state.removeES){ state.removeES.close(); state.removeES=null; } }

// =============================================================================
// SETUP WIZARD
// =============================================================================
const STEP_LABELS = ['Preflight','Network','Method','Configure','Review'];

function renderSetup(){
  const c = $('#view-setup');
  const steps = STEP_LABELS.map((l,i)=>{
    const n=i+1; const cls = n<state.setupStep?'done':(n===state.setupStep?'active':'');
    return `<div class="step ${cls}"><div class="num">${n<state.setupStep?'✓':n}</div><div class="slbl">${l}</div></div>`;
  }).join('');
  c.innerHTML = `<div class="note">This wizard installs a <strong>${esc(cap(state.node))}</strong> node directly via <span class="mono">setup-${esc(state.node)}.sh --json</span>: generate keys, then (after you confirm a backup) finalize and start. Source builds take 20–40 minutes.</div>
    <div class="steps">${steps}</div><div class="card" id="stepBody"></div>`;
  const body = $('#stepBody');
  ({1:stepPreflight,2:stepNetwork,3:stepMethod,4:stepConfigure,5:stepReview}[state.setupStep])(body);
}

function goStep(n){ state.setupStep=n; renderSetup(); }

async function stepPreflight(body){
  body.innerHTML = `<h3>Step 1 · Preflight Checks</h3><div id="pfList"><div class="muted">Running checks…</div></div>
    <div class="wiz-nav"><button class="btn btn-out" id="pfRerun">↻ Re-run Checks</button><button class="btn btn-green" id="pfNext" disabled>Continue →</button></div>`;
  $('#pfRerun').addEventListener('click', ()=>stepPreflight(body));
  const d = await api('/api/setup/preflight');
  state.preflight = d;
  const hard = [
    ['systemd', d.systemd?.ok, `systemd ${d.systemd?.version??'?'} (need ≥ ${d.systemd?.required??247})`, true],
    ['internet', d.internet?.ok, 'Outbound internet connectivity', true],
    ['disk', d.disk?.ok, `Disk usage ${d.disk?.percent??'?'}% (need < 90%)`, true],
  ];
  const soft = [
    ['docker', d.docker?.ok, 'Docker engine available (optional)', false],
    ['rust', d.rust?.ok, 'Rust toolchain for source build (optional)', false],
    ['tpm', d.tpm?.ok, 'TPM device for sealed passphrase (optional)', false],
  ];
  const row = ([name,ok,desc,hardReq])=>{
    const icon = ok?'<span style="color:var(--green)">✓</span>':(hardReq?'<span style="color:var(--red)">✗</span>':'<span style="color:var(--yellow)">!</span>');
    return `<div class="check"><div class="ci">${icon}</div><div class="cl"><div class="ct">${esc(cap(name))}</div><div class="cd">${esc(desc)}</div></div></div>`;
  };
  $('#pfList').innerHTML = hard.map(row).join('') + soft.map(row).join('');
  const hardOk = hard.every(h=>h[1]);
  const next = $('#pfNext'); next.disabled = !hardOk;
  next.title = hardOk?'':'Hard requirements must pass';
  next.addEventListener('click', ()=>{ if(hardOk) goStep(2); });
  if(!hardOk) toast('Some hard requirements failed — resolve them before continuing','error');
}

function stepNetwork(body){
  body.innerHTML = `<h3>Step 2 · Network</h3>
    <div class="radio-cards">
      <div class="rcard ${state.setup.network==='adiri'?'sel':''}" data-net="adiri">
        <div class="rt">Adiri Testnet</div><div class="rd">Telcoin's public test network. Recommended for new nodes.</div></div>
      <div class="rcard disabled"><div class="rt">Mainnet <span class="tag">coming soon</span></div><div class="rd">Production network — not yet available.</div></div>
    </div>
    <div class="wiz-nav"><button class="btn btn-out" onclick="goStep(1)">← Back</button><button class="btn btn-green" onclick="goStep(3)">Continue →</button></div>`;
  body.querySelectorAll('[data-net]').forEach(r=>r.addEventListener('click',()=>{state.setup.network=r.dataset.net;renderSetup();}));
}

function stepMethod(body){
  const m = state.setup.method;
  const methodField = m==='source'
    ? `<div class="field"><label>Source ref to build (tag / branch / commit) — required</label>
        <input id="mBuildRef" placeholder="e.g. v0.9.2-adiri or main" value="${esc(state.setup.buildRef||'')}"></div>`
    : `<div class="field"><label>Docker image (with tag)</label>
        <input id="mDockerImage" placeholder="us-docker.pkg.dev/telcoin-network/tn-public/adiri:v0.9.2-adiri" value="${esc(state.setup.dockerImage||'')}"></div>`;
  body.innerHTML = `<h3>Step 3 · Install Method</h3>
    <div class="radio-cards" style="grid-template-columns:1fr 1fr 1fr">
      <div class="rcard ${m==='source'?'sel':''}" data-m="source"><div class="rt">Build from Source</div><div class="rd">Compile the Rust binary on this host. Most flexible.</div></div>
      <div class="rcard ${m==='docker'?'sel':''}" data-m="docker"><div class="rt">Docker</div><div class="rd">Run the official container image.</div></div>
      <div class="rcard disabled"><div class="rt">Existing Binary <span class="tag">coming soon</span></div><div class="rd">Use a pre-built binary.</div></div>
    </div>
    ${methodField}
    <div class="wiz-nav"><button class="btn btn-out" onclick="goStep(2)">← Back</button><button class="btn btn-green" id="methodNext">Continue →</button></div>`;
  body.querySelectorAll('[data-m]').forEach(r=>r.addEventListener('click',()=>{
    // Persist whichever method field is currently shown before switching.
    if($('#mBuildRef')) state.setup.buildRef=$('#mBuildRef').value.trim();
    if($('#mDockerImage')) state.setup.dockerImage=$('#mDockerImage').value.trim();
    state.setup.method=r.dataset.m; renderSetup();
  }));
  $('#methodNext').addEventListener('click', ()=>{
    if($('#mBuildRef')) state.setup.buildRef=$('#mBuildRef').value.trim();
    if($('#mDockerImage')) state.setup.dockerImage=$('#mDockerImage').value.trim();
    if(state.setup.method==='source' && !state.setup.buildRef){ toast('Enter a source ref to build','error'); return; }
    goStep(4);
  });
}

function stepConfigure(body){
  const p = state.setup.passphrase;
  const instDefault = state.node==='validator' ? '1' : '5';
  body.innerHTML = `<h3>Step 4 · Configure</h3>
    <div class="field"><label>${state.node==='validator'?'Validator execution address':'Observer Ethereum address'} (0x…)</label><input id="cfgEth" placeholder="0x…" value="${esc(state.setup.eth||'')}"></div>
    <div class="field"><label>Public / external IP (advertised to peers)</label><input id="cfgPubIp" placeholder="e.g. 203.0.113.10" value="${esc(state.setup.publicIp||'')}"></div>
    <div class="field"><label>Instance number (RPC port = 8545 − (instance − 1))</label><input id="cfgInstance" placeholder="${instDefault}" value="${esc(state.setup.instance||'')}"></div>
    <div class="field"><label>BLS Passphrase (encrypts the node key — you'll need it on every start)</label><input id="cfgBls" type="password" placeholder="••••••••" value="${esc(state.setup.bls||'')}"></div>
    <div class="field"><label>Passphrase Protection</label>
      <div class="radio-cards">
        <div class="rcard ${p==='loadcredential'?'sel':''}" data-p="loadcredential"><div class="rt">LoadCredential</div><div class="rd">systemd-managed credential file. Simple, works everywhere.</div></div>
        <div class="rcard ${p==='tpm'?'sel':''}" data-p="tpm"><div class="rt">TPM / vTPM</div><div class="rd">Seal the passphrase to hardware TPM. More secure.</div></div>
      </div>
    </div>
    <div class="note">Listener (bind) and external multiaddrs are derived for the standard P2P ports
      (49590/49594): external uses your public IP, listener binds <span class="mono">0.0.0.0</span>.</div>
    <div class="wiz-nav"><button class="btn btn-out" onclick="goStep(3)">← Back</button><button class="btn btn-green" id="cfgNext">Continue →</button></div>`;
  body.querySelectorAll('[data-p]').forEach(r=>r.addEventListener('click',()=>{
    state.setup.eth=$('#cfgEth').value.trim(); state.setup.publicIp=$('#cfgPubIp').value.trim();
    state.setup.instance=$('#cfgInstance').value.trim(); state.setup.bls=$('#cfgBls').value;
    state.setup.passphrase=r.dataset.p; renderSetup();
  }));
  $('#cfgNext').addEventListener('click', ()=>{
    state.setup.eth = $('#cfgEth').value.trim();
    state.setup.publicIp = $('#cfgPubIp').value.trim();
    state.setup.instance = $('#cfgInstance').value.trim();
    state.setup.bls = $('#cfgBls').value;
    if(!/^0x[0-9a-fA-F]{40}$/.test(state.setup.eth)){ toast('Enter a valid 0x… address','error'); return; }
    if(!/^([0-9]{1,3}\.){3}[0-9]{1,3}$/.test(state.setup.publicIp) && !/^[0-9a-fA-F:]+$/.test(state.setup.publicIp)){ toast('Enter a valid public IP','error'); return; }
    if(state.setup.instance && !/^[1-9]$/.test(state.setup.instance)){ toast('Instance must be 1–9','error'); return; }
    if(!state.setup.bls){ toast('Enter a BLS passphrase','error'); return; }
    goStep(5);
  });
}

// Step 5 is now a live installer: review -> Generate Keys (keygen phase) ->
// forced BACKED UP gate -> Finalize & Start (finalize phase).
function stepReview(body){
  const s = state.setup;
  const rows = [
    ['Node Type', cap(state.node)],
    ['Network', s.network==='adiri'?'Adiri Testnet':s.network],
    ['Install Method', s.method + (s.method==='source'?' ('+(s.buildRef||'?')+')':(s.dockerImage?' ('+s.dockerImage+')':''))],
    ['Address', s.eth||'(not set)'],
    ['Public IP', s.publicIp||'(not set)'],
    ['Instance', s.instance || (state.node==='validator'?'1 (default)':'5 (default)')],
    ['BLS Passphrase', s.bls?'•••••••• (set)':'(not set)'],
    ['Passphrase Protection', s.passphrase==='tpm'?'TPM / vTPM':'LoadCredential'],
  ];
  body.innerHTML = `<h3>Step 5 · Install</h3>
    ${rows.map(([k,v])=>`<div class="kv"><span class="k">${esc(k)}</span><span class="v">${esc(v)}</span></div>`).join('')}
    <div class="note" style="margin-top:14px">Phase 1 generates the node keys (no service is created or started yet). After you confirm a backup, phase 2 finalizes and starts the node.${state.node==='validator'?' <strong>Validator on-chain registration is a separate CLI step the node will guide you through afterward.</strong>':''}</div>
    <div class="svc-row"><button class="btn btn-green" id="genKeysBtn">⚙ Generate Keys</button>
      <button class="btn btn-out" onclick="goStep(4)">← Back</button></div>
    <div class="card" id="setupProgressCard" style="display:none;margin-top:14px">
      <h3>Progress</h3><div class="log-body" id="setupLog" style="height:260px"></div>
    </div>
    <div id="backupGate"></div>`;
  $('#genKeysBtn').addEventListener('click', runKeygen);
}

function buildSetupPayload(includePassphrase){
  const s = state.setup;
  const p2p=49590, worker=49594;
  const ip = s.publicIp || '0.0.0.0';
  const payload = {
    network: 'testnet',
    install_method: s.method,
    passphrase_method: s.passphrase,
    address: s.eth,
    build_ref: s.method==='source' ? s.buildRef : '',
    docker_image: s.method==='docker' ? s.dockerImage : '',
    instance: s.instance,
    external_primary: `/ip4/${ip}/udp/${p2p}/quic-v1`,
    external_worker:  `/ip4/${ip}/udp/${worker}/quic-v1`,
    listener_primary: `/ip4/0.0.0.0/udp/${p2p}/quic-v1`,
    listener_worker:  `/ip4/0.0.0.0/udp/${worker}/quic-v1`,
    public_ip: s.publicIp,
  };
  if(includePassphrase) payload.passphrase = s.bls;
  return payload;
}

// POST a setup phase and stream the response body (NOT EventSource -- so the
// passphrase never appears in a URL). Returns the terminal done event, or null.
async function streamSetup(phase, includePassphrase){
  let resp;
  try{
    resp = await fetch('/api/setup/'+state.node+'/'+phase, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(buildSetupPayload(includePassphrase)),
    });
  }catch(e){ toast('Setup request failed: '+e,'error'); return null; }
  if(!resp.ok){
    let msg=''; try{ msg=(await resp.json()).error; }catch(_){}
    toast('Setup rejected: '+(msg||resp.status),'error'); return null;
  }
  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let buf='', result=null;
  for(;;){
    const {value,done} = await reader.read();
    if(done) break;
    buf += dec.decode(value,{stream:true});
    let i;
    while((i=buf.indexOf('\n\n'))>=0){
      const frame=buf.slice(0,i); buf=buf.slice(i+2);
      const line=frame.split('\n').find(l=>l.startsWith('data: '));
      if(!line) continue;
      let d; try{ d=JSON.parse(line.slice(6)); }catch(_){ continue; }
      if(d.event==='closed') continue;
      appendStream('#setupLog', d);
      if(d.event==='done') result=d;
    }
  }
  return result;
}

async function runKeygen(){
  const b=$('#genKeysBtn'); if(b) b.disabled=true;
  const card=$('#setupProgressCard'); if(card) card.style.display='block';
  const log=$('#setupLog'); if(log) log.innerHTML='<div class="log-line info">» generating keys… (source builds take 20–40 min — keep this tab open)</div>';
  const d = await streamSetup('keygen', true);
  if(d && d.ok){ toast('Keys generated — back them up','success'); showBackupGate(d); }
  else { toast('Key generation failed'+(d&&d.msg?': '+d.msg:''),'error'); if(b) b.disabled=false; }
}

function showBackupGate(d){
  const info = d.node_info || '';
  const gate = $('#backupGate'); if(!gate) return;
  gate.innerHTML = `
    <div class="card" style="margin-top:14px;border-color:rgba(255,77,109,0.45)">
      <h3 style="color:var(--red)">⚠ Back up your keys now — they are UNRECOVERABLE if lost</h3>
      <div class="kv"><span class="k">Key files</span><span class="v">${esc(d.keys_dir||'—')}</span></div>
      <div class="kv"><span class="k">node-info.yaml</span><span class="v">${esc(d.node_info_path||'—')}</span></div>
      ${info?`<div class="log-body" style="height:220px;white-space:pre-wrap;margin-top:10px">${esc(info)}</div>`:'<p class="muted" style="font-size:13px;margin-top:10px">node-info.yaml not found on disk — copy the key files directly.</p>'}
      <div class="svc-row" style="margin-top:12px">
        ${info?'<button class="btn btn-out" id="dlNodeInfo">⤓ Download node-info.yaml</button>':''}
      </div>
      <div class="field"><label>Type <span class="mono">BACKED UP</span> to confirm you have saved these key files</label>
        <input id="backedUpInput" autocomplete="off" placeholder="BACKED UP"></div>
      <div class="svc-row"><button class="btn btn-green" id="finalizeBtn" disabled>Continue → Finalize &amp; Start Node</button></div>
    </div>`;
  const dl=$('#dlNodeInfo'); if(dl) dl.addEventListener('click', ()=>{
    const blob=new Blob([info],{type:'text/yaml'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='node-info.yaml'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(a.href);
  });
  const inp=$('#backedUpInput'), fb=$('#finalizeBtn');
  inp.addEventListener('input', ()=>{ fb.disabled = inp.value!=='BACKED UP'; });
  fb.addEventListener('click', runFinalize);
}

async function runFinalize(){
  const fb=$('#finalizeBtn'), inp=$('#backedUpInput');
  if(inp && inp.value!=='BACKED UP') return;
  if(fb) fb.disabled=true; if(inp) inp.disabled=true;
  const log=$('#setupLog'); if(log) log.insertAdjacentHTML('beforeend','<div class="log-line info">» finalizing and starting the node…</div>');
  const d = await streamSetup('finalize', false);
  if(d && d.ok){
    toast('Node finalized and started','success');
    await loadNodes();
    setTimeout(()=>{ state.setupStep=1; switchView('dashboard'); }, 1800);
  } else {
    toast('Finalize failed'+(d&&d.msg?': '+d.msg:''),'error');
    if(fb) fb.disabled=false; if(inp) inp.disabled=false;
  }
}

// =============================================================================
// Auto-refresh + utils
// =============================================================================
function startAutoRefresh(){
  stopAutoRefresh();
  state.refreshTimer = setInterval(()=>{ loadNodes(); if(state.view==='dashboard') renderDashboard(); }, 15000);
}
function stopAutoRefresh(){ if(state.refreshTimer){ clearInterval(state.refreshTimer); state.refreshTimer=null; } }

function startTracesRefresh(){
  stopTracesRefresh();
  state.tracesTimer = setInterval(()=>{ if(state.view==='traces') refreshTracesData(); }, 30000);
}
function stopTracesRefresh(){ if(state.tracesTimer){ clearInterval(state.tracesTimer); state.tracesTimer=null; } }

function cap(s){ return String(s).charAt(0).toUpperCase()+String(s).slice(1); }
function fmtNum(n){ return Number(n).toLocaleString('en-US'); }
function netLabel(n){ return ({testnet:'Adiri Testnet', mainnet:'Mainnet'})[n] || (n?cap(n):'—'); }

// =============================================================================
// Nav-bar network status pill (Adiri Testnet, from /api/network/status)
// =============================================================================
function setNavNetPill(d){
  const el = $('#navNetPill'); if(!el) return;
  const overall = d && d.overall;
  if(!d || d.error || d.available===false || !overall || overall==='unknown'){
    el.className = 'net-pill'; el.textContent = '⚪ Network: —'; return;
  }
  const map = {
    up:       ['up',       '🟢 Network: Healthy'],
    degraded: ['degraded', '🟡 Network: Degraded'],
    down:     ['down',     '🔴 Network: Down'],
  };
  const [cls, txt] = map[overall] || ['', '⚪ Network: —'];
  el.className = 'net-pill ' + cls;
  el.textContent = txt;
}

async function pollNavNetPill(){
  setNavNetPill(await api('/api/network/status'));
}

// =============================================================================
// Boot
// =============================================================================
(async function init(){
  await loadNodes();
  // Default-select an installed node if the current default isn't installed.
  if(!state.nodes[state.node]?.installed){
    const other = state.node==='observer'?'validator':'observer';
    if(state.nodes[other]?.installed){
      state.node = other;
      document.querySelectorAll('.node-btn').forEach(n=>n.classList.toggle('active', n.dataset.node===state.node));
    }
  }
  renderDashboard();
  startAutoRefresh();
  // Nav-bar network pill: refresh independently of the active view (60s; the
  // backend caches the external call anyway).
  pollNavNetPill();
  setInterval(pollNavNetPill, 60000);
})();
</script>
